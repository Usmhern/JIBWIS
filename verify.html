<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfriFUND Admin Dashboard</title>

<style>
* {
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body {
  margin: 0;
  background: #f4f6f9;
}

/* SIDEBAR */
.sidebar {
  position: fixed;
  width: 220px;
  height: 100%;
  background: #052;
  color: white;
  padding-top: 20px;
}

.sidebar h3 {
  text-align: center;
  margin-bottom: 20px;
}

.sidebar a {
  display: block;
  padding: 12px 20px;
  color: white;
  text-decoration: none;
}

.sidebar a:hover {
  background: #0a7;
}

/* MAIN */
.main {
  margin-left: 220px;
  padding: 20px;
}

h2 {
  color: #052;
  text-align: center;
}

/* CONTROLS */
.controls {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
  margin-top: 20px;
}

/* SEARCH */
.search-box {
  position: relative;
}

.search-box input {
  padding: 8px 10px 8px 35px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

.search-box span {
  position: absolute;
  left: 10px;
  top: 8px;
  color: #888;
}

/* TABLE */
.table-box {
  margin-top: 15px;
  background: white;
  border-radius: 10px;
  overflow-x: auto;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

table {
  width: 100%;
  border-collapse: collapse;
  min-width: 1000px;
}

th, td {
  padding: 10px;
  border: 1px solid #eee;
  font-size: 13px;
}

th {
  background: #052;
  color: white;
  position: sticky;
  top: 0;
}

tr:hover {
  background: #f1f8f1;
}

/* BUTTONS */
button {
  cursor: pointer;
  border: none;
  border-radius: 5px;
}

.btn-download {
  background: #052;
  color: white;
  padding: 8px 15px;
}

.btn-edit { background: orange; color: white; padding: 5px 10px; }
.btn-delete { background: red; color: white; padding: 5px 10px; }

/* PAGINATION */
.pagination {
  text-align: center;
  margin-top: 15px;
}

.pagination button {
  margin: 3px;
  padding: 6px 10px;
  background: #052;
  color: white;
}

.pagination .active {
  background: #0a7;
}

/* LOADER */
.spinner {
  border: 4px solid #eee;
  border-top: 4px solid #052;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 20px auto;
  display: none;
}

@keyframes spin {
  100% { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <h3>AfriFUND</h3>
  <a href="#">📄 Applications</a>
  <a href="#">🛠 Admin</a>
  <a href="#">⚙ Settings</a>
</div>

<!-- MAIN -->
<div class="main">

<h2>AfriFUND Database</h2>

<div class="controls">

  <button class="btn-download" onclick="downloadPDF()">⬇ Download PDF</button>

  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Search records...">
  </div>

  <div>
    <span id="totalCount"></span>

    <select id="rowsPerPage">
      <option value="10">10</option>
      <option value="25">25</option>
      <option value="50">50</option>
      <option value="100">100</option>
      <option value="all">All</option>
    </select>
  </div>

</div>

<div id="loader" class="spinner"></div>

<div class="table-box" id="tableContainer"></div>

<div class="pagination" id="pagination"></div>

</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbw7wt1Rok24XHEoRUJ1ruw9qnEBCtd_LldUFX-Zo-0toAFNoJWL27MgVTiFdg1MOk3t/exec";

let allData = [];
let filteredData = [];
let currentPage = 1;
let rowsPerPage = 10;
let isTyping = false;

/* FETCH */
function fetchRecords() {
  loader.style.display = "block";

  fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
      allData = data;
      filteredData = data;
      renderTable();
    })
    .finally(() => loader.style.display = "none");
}

/* SEARCH */
searchInput.addEventListener("input", function() {
  let value = this.value.toLowerCase();

  filteredData = allData.filter(row =>
    Object.values(row).join(" ").toLowerCase().includes(value)
  );

  currentPage = 1;
  renderTable();
});

/* TYPING CONTROL */
searchInput.addEventListener("focus", () => isTyping = true);
searchInput.addEventListener("blur", () => isTyping = false);

/* ROW CHANGE */
rowsPerPage.onchange = function() {
  rowsPerPage = this.value === "all" ? "all" : parseInt(this.value);
  currentPage = 1;
  renderTable();
};

/* TABLE */
function renderTable() {
  totalCount.innerText = "Total: " + filteredData.length;

  let start = (currentPage - 1) * rowsPerPage;
  let end = rowsPerPage === "all" ? filteredData.length : start + rowsPerPage;
  let data = rowsPerPage === "all" ? filteredData : filteredData.slice(start, end);

  if (!data.length) {
    tableContainer.innerHTML = "No records found";
    return;
  }

  let headers = Object.keys(data[0]).filter(h => h !== "rowNumber");

  let html = "<table><thead><tr><th>SN</th>";
  headers.forEach(h => html += `<th>${h}</th>`);
  html += "<th>Actions</th></tr></thead><tbody>";

  data.forEach((row, i) => {
    html += `<tr><td>${start + i + 1}</td>`;
    headers.forEach(h => html += `<td>${row[h] || ""}</td>`);
    html += `<td>
      <button class="btn-edit">Edit</button>
      <button class="btn-delete">Delete</button>
    </td></tr>`;
  });

  html += "</tbody></table>";
  tableContainer.innerHTML = html;

  renderPagination(filteredData.length);
}

/* PAGINATION */
function renderPagination(total) {
  if (rowsPerPage === "all") return pagination.innerHTML = "";

  let pages = Math.ceil(total / rowsPerPage);
  let html = "";

  for (let i = 1; i <= pages; i++) {
    html += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }

  pagination.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
}

/* AUTO REFRESH */
setInterval(() => {
  if (!isTyping) fetchRecords();
}, 5000);

/* PDF */
function downloadPDF() {
  alert("PDF logic already in your system");
}

/* INIT */
fetchRecords();
</script>

</body>
</html>
