<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Center - Manage Records</title>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { margin: 0; padding: 20px; background: #f0f2f5; color: #333; }

h2 { color: #052; text-align: center; margin-top: 20px; }

.controls {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  margin-top: 20px;
  gap: 10px;
}

.controls input, .controls select {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

.table-responsive {
  width: 100%;
  overflow-x: auto;
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  margin-top: 10px;
}

table { width: 100%; border-collapse: collapse; min-width: 1100px; }
th, td { padding: 12px; border: 1px solid #eee; font-size: 13px; }
th { background: #052; color: white; position: sticky; top: 0; }
tr:hover { background-color: #f1f8f1; }

.btn-edit { background: #ff9800; color: white; border: none; padding: 6px 12px; cursor: pointer; }
.btn-delete { background: #d9534f; color: white; border: none; padding: 6px 12px; cursor: pointer; }

.pagination { margin-top: 15px; text-align: center; }
.pagination button {
  margin: 3px;
  padding: 6px 10px;
  border: none;
  background: #052;
  color: white;
  cursor: pointer;
}
.pagination button.active { background: #0a7; }

/* MODAL */
#editModal {
  display: none;
  position: fixed;
  z-index: 2000;
  left: 0;
  top: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.6);
}

.modal-content {
  background: white;
  margin: 5% auto;
  padding: 20px;
  width: 90%;
  max-width: 400px;
  border-radius: 10px;
}

.modal-actions {
  display: flex;
  justify-content: space-between;
  margin-top: 10px;
}

/* SPINNER */
.spinner {
  border: 4px solid #f3f3f3;
  border-top: 4px solid #052;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  animation: spin 1s linear infinite;
  margin: 20px auto;
  display: none;
}

@keyframes spin { 100% { transform: rotate(360deg); } }

/* SIDEBAR */
#menuBtn {
  position: fixed;
  top: 15px;
  left: 15px;
  font-size: 22px;
  cursor: pointer;
  z-index: 4000;
  background: #052;
  color: white;
  padding: 6px 10px;
  border-radius: 5px;
}

#sidebar {
  position: fixed;
  top: 0;
  left: -260px;
  width: 250px;
  height: 100%;
  background: #052;
  color: white;
  padding: 20px;
  transition: 0.3s;
  z-index: 3500;
}

#sidebar a {
  display: block;
  padding: 10px;
  color: white;
  text-decoration: none;
}

#sidebar a:hover { background: rgba(255,255,255,0.1); }

/* NOTIFICATION */
#notifBox {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

</style>
</head>

<body>

<!-- SIDEBAR BUTTON -->
<div id="menuBtn" onclick="toggleSidebar()">⋮</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <h3>Menu</h3>
  <a href="#">Applications Form</a>
  <a href="#">Admin</a>
  <a href="#">Settings</a>
</div>

<h2>AfriFUND Database</h2>

<div class="controls">
  <button onclick="downloadPDF()" style="background:#052;color:white;border:none;padding:8px 15px;border-radius:5px;cursor:pointer;">
    Download PDF
  </button>

  <input type="text" id="searchInput" placeholder="Search records...">

  <div style="display:flex; align-items:center; gap:10px;">
    <span id="totalCount" style="font-weight:bold; color:#052;">Total: 0</span>

    <select id="rowsPerPage">
      <option value="10">0-10</option>
      <option value="25">10-25</option>
      <option value="50">10-50</option>
      <option value="100">10-100</option>
      <option value="all">All</option>
    </select>
  </div>
</div>

<div id="loader" class="spinner"></div>
<div class="table-responsive" id="tableContainer"></div>
<div class="pagination" id="pagination"></div>

<!-- MODAL -->
<div id="editModal">
  <div class="modal-content">
    <h3>Edit Record</h3>

    <form id="editForm">
      <input type="hidden" name="rowNumber" id="editRowNumber">
      <input type="hidden" name="action" value="edit">

      <div id="dynamicEditFields"></div>

      <div class="modal-actions">
        <button type="button" onclick="closeModal()">Cancel</button>
        <button type="submit" id="saveBtn">Save</button>
      </div>
    </form>
  </div>
</div>

<!-- NOTIFICATIONS -->
<div id="notifBox"></div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbw7wt1Rok24XHEoRUJ1ruw9qnEBCtd_LldUFX-Zo-0toAFNoJWL27MgVTiFdg1MOk3t/exec";

let allData = [];
let filteredData = [];
let currentPage = 1;
let rowsPerPage = 10;
let previousLength = 0;

window.onload = fetchRecords;

/* FETCH */
function fetchRecords() {
  loader.style.display = "block";
  fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
      allData = data;
      filteredData = data;
      renderTable();
    })
    .finally(() => loader.style.display = "none");
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", function () {
  const value = this.value.toLowerCase();
  filteredData = allData.filter(row =>
    Object.values(row).join(" ").toLowerCase().includes(value)
  );
  currentPage = 1;
  renderTable();
});

/* ROWS */
document.getElementById("rowsPerPage").addEventListener("change", function () {
  rowsPerPage = this.value === "all" ? "all" : parseInt(this.value);
  currentPage = 1;
  renderTable();
});

/* TABLE */
function renderTable() {
  document.getElementById("totalCount").innerText = "Total: " + filteredData.length;

  let data = filteredData;
  let start = (rowsPerPage === "all") ? 0 : (currentPage - 1) * rowsPerPage;
  let paginated = (rowsPerPage === "all") ? data : data.slice(start, start + rowsPerPage);

  if (!data.length) {
    tableContainer.innerHTML = "<p>No records found.</p>";
    pagination.innerHTML = "";
    return;
  }

  let headers = Object.keys(data[0]).filter(h => h !== "rowNumber");

  let html = `<table><thead><tr><th>SN</th>`;
  headers.forEach(h => html += `<th>${h}</th>`);
  html += `<th>Actions</th></tr></thead><tbody>`;

  paginated.forEach((row, i) => {
    let sn = (rowsPerPage === "all") ? (i + 1) : (start + i + 1);

    html += `<tr><td>${sn}</td>`;
    headers.forEach(h => html += `<td>${row[h] || ""}</td>`);
    html += `<td>
      <button class="btn-edit" onclick='openEditModal(${JSON.stringify(row)})'>Edit</button>
      <button class="btn-delete" onclick="deleteRow(${row.rowNumber})">Delete</button>
    </td></tr>`;
  });

  html += `</tbody></table>`;
  tableContainer.innerHTML = html;

  renderPagination(data.length);
}

/* PAGINATION */
function renderPagination(total) {
  if (rowsPerPage === "all") {
    pagination.innerHTML = "";
    return;
  }

  let pages = Math.ceil(total / rowsPerPage);
  let html = "";

  for (let i = 1; i <= pages; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }

  pagination.innerHTML = html;
}

function goPage(p) {
  currentPage = p;
  renderTable();
}

/* DELETE */
function deleteRow(rowNum) {
  let fd = new FormData();
  fd.append("action", "delete");
  fd.append("rowNumber", rowNum);

  fetch(scriptURL, { method: "POST", body: fd })
    .then(() => fetchRecords());
}

/* EDIT */
function buildEditForm(row) {
  const c = document.getElementById("dynamicEditFields");
  c.innerHTML = "";

  Object.keys(row).forEach(k => {
    if (k === "rowNumber" || k.toLowerCase() === "otp") return;

    c.innerHTML += `
      <label style="font-size:12px;font-weight:bold;">${k}</label>
      <input type="text" name="${k}" value="${row[k] || ""}" style="width:100%;padding:8px;margin:5px 0;">
    `;
  });
}

function openEditModal(row) {
  editRowNumber.value = row.rowNumber;
  buildEditForm(row);
  editModal.style.display = "block";
}

function closeModal() {
  editModal.style.display = "none";
}

editForm.onsubmit = function (e) {
  e.preventDefault();
  saveBtn.innerText = "Saving...";

  fetch(scriptURL, { method: "POST", body: new FormData(this) })
    .then(() => {
      closeModal();
      fetchRecords();
    })
    .finally(() => saveBtn.innerText = "Save");
};

/* SIDEBAR */
function toggleSidebar() {
  const s = document.getElementById("sidebar");
  s.style.left = (s.style.left === "0px") ? "-260px" : "0px";
}

/* NOTIFICATION */
function showNotification(msg) {
  const box = document.getElementById("notifBox");

  const n = document.createElement("div");
  n.innerText = msg;
  n.style.cssText = `
    background:#052;color:white;padding:12px;border-radius:6px;
    animation: slideIn .3s ease;
  `;

  box.appendChild(n);

  setTimeout(() => {
    n.remove();
  }, 4000);
}

/* AUTO REFRESH + LIVE ALERT */
setInterval(() => {
  fetch(scriptURL)
    .then(r => r.json())
    .then(data => {

      if (previousLength && data.length > previousLength) {
        showNotification("🔔 " + (data.length - previousLength) + " New Record(s) Added");
      }

      previousLength = data.length;

      allData = data;

      const v = document.getElementById("searchInput").value.toLowerCase();

      filteredData = allData.filter(r =>
        Object.values(r).join(" ").toLowerCase().includes(v)
      );

      renderTable();
    });
}, 5000);

/* ===== PDF (YOUR LOGIC KEPT) ===== */
function formatDate(v) {
  if (!v) return "";
  let d = new Date(v);
  if (isNaN(d)) return v;
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${d.getFullYear()}`;
}

async function downloadPDF() {
  const { jsPDF } = window.jspdf;

  let data = filteredData;
  if (!data.length) return alert("No data");

  let headers = Object.keys(data[0]).filter(h =>
    h !== "rowNumber" &&
    h.toLowerCase() !== "otp"
  ).slice(1, -1);

  const pdf = new jsPDF('l','mm','a4');
  let y = 10;

  pdf.text("AfriFUND Records", 148, y, {align:"center"});
  y += 10;

  let xStart = 10;
  let rowH = 7;

  function header() {
    let x = xStart;
    pdf.setFont(undefined,"bold");

    pdf.text("SN", x+2, y+5);
    x += 15;

    headers.forEach(h => {
      pdf.text(h, x+2, y+5);
      x += 30;
    });

    y += rowH;
    pdf.setFont(undefined,"normal");
  }

  header();

  data.forEach((r,i) => {
    if (y > 200) {
      pdf.addPage();
      y = 10;
      header();
    }

    let x = xStart;

    pdf.text(String(i+1), x+2, y+5);
    x += 15;

    headers.forEach(h => {
      pdf.text(String(r[h] || "").slice(0,20), x+2, y+5);
      x += 30;
    });

    y += rowH;
  });

  pdf.save("AfriFUND.pdf");
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
