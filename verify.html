<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Data Center - Manage Records</title>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { margin: 0; padding: 20px; background: #f0f2f5; color: #333; }

h2 { color: #052; text-align: center; margin-top: 20px; }

/* Controls */
.controls {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  margin-top: 20px;
  gap: 10px;
}

.controls input, .controls select {
  padding: 8px;
  border-radius: 5px;
  border: 1px solid #ccc;
}

/* Table */
.table-responsive {
  width: 100%;
  overflow-x: auto;
  background: white;
  border-radius: 10px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  margin-top: 10px;
}

table { width: 100%; border-collapse: collapse; min-width: 1100px; }
th, td { padding: 12px; border: 1px solid #eee; font-size: 13px; }
th { background: #052; color: white; position: sticky; top: 0; }
tr:hover { background-color: #f1f8f1; }

/* Buttons */
.btn-edit { background: #ff9800; color: white; border: none; padding: 6px 12px; cursor: pointer; }
.btn-delete { background: #d9534f; color: white; border: none; padding: 6px 12px; cursor: pointer; }

/* Pagination */
.pagination {
  margin-top: 15px;
  text-align: center;
}
.pagination button {
  margin: 3px;
  padding: 6px 10px;
  border: none;
  background: #052;
  color: white;
  cursor: pointer;
}
.pagination button.active {
  background: #0a7;
}

/* Modal (unchanged) */
#editModal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
.modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 10px; }
.modal-content input { width: 100%; padding: 8px; margin: 8px 0; }
.modal-actions { display: flex; justify-content: space-between; }

.spinner { border: 4px solid #f3f3f3; border-top: 4px solid #052; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<h2>AfriFUND Database</h2>

<div class="controls">
  <button onclick="downloadPDF()" style="
  background:#052;
  color:white;
  border:none;
  padding:8px 15px;
  border-radius:5px;
  cursor:pointer;
">
  Download PDF
  </button>
  <input type="text" id="searchInput" placeholder="Search records...">

  <div style="display:flex; align-items:center; gap:10px;">
    <span id="totalCount" style="font-weight:bold; color:#052;">
      Total: 0
    </span>

    <select id="rowsPerPage">
      <option value="10">0-10</option>
      <option value="25">10-25</option>
      <option value="50">10-50</option>
      <option value="100">10-100</option>
      <option value="all">All</option>
    </select>
  </div>
</div>
  

<div id="loader" class="spinner"></div>
<div class="table-responsive" id="tableContainer"></div>
<div class="pagination" id="pagination"></div>

<!-- EDIT MODAL (UNCHANGED) -->
<div id="editModal">
  <div class="modal-content">
    <h3>Edit Record</h3>
    <form id="editForm">
      <input type="hidden" name="rowNumber" id="editRowNumber">
      <input type="hidden" name="action" value="edit">
      <input type="text" name="Name" id="editName" required>
      <input type="text" name="NIN" id="editNIN" required>
      <input type="text" name="Phone Number" id="editPhone" required>
      <input type="email" name="Email" id="editEmail" required>

      <div class="modal-actions">
        <button type="button" onclick="closeModal()">Cancel</button>
        <button type="submit" id="saveBtn">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbw7wt1Rok24XHEoRUJ1ruw9qnEBCtd_LldUFX-Zo-0toAFNoJWL27MgVTiFdg1MOk3t/exec";

let allData = [];
let filteredData = [];
let currentPage = 1;
let rowsPerPage = 10;

window.onload = fetchRecords;

/* FETCH */
function fetchRecords() {
  loader.style.display = "block";
  fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
      allData = data;
      filteredData = data;
      renderTable();
    })
    .finally(() => loader.style.display = "none");
}

/* SEARCH */
document.getElementById("searchInput").addEventListener("input", function() {
  const value = this.value.toLowerCase();
  filteredData = allData.filter(row =>
    Object.values(row).join(" ").toLowerCase().includes(value)
  );
  currentPage = 1;
  renderTable();
});

/* ROW SELECT */
document.getElementById("rowsPerPage").addEventListener("change", function() {
  rowsPerPage = this.value === "all" ? "all" : parseInt(this.value);
  currentPage = 1;
  renderTable();
});

/* TABLE */
function renderTable() {
  document.getElementById("totalCount").innerText = "Total: " + filteredData.length;
 
  let data = filteredData;
  let start = (currentPage - 1) * rowsPerPage;
  let end = rowsPerPage === "all" ? data.length : start + rowsPerPage;
  let paginated = rowsPerPage === "all" ? data : data.slice(start, end);

  if (data.length === 0) {
    tableContainer.innerHTML = "<p>No records found.</p>";
    pagination.innerHTML = "";
    return;
  }

  let headers = Object.keys(data[0]).filter(h => h !== "rowNumber");

  let html = `<table><thead><tr><th>SN</th>`;
  headers.forEach(h => html += `<th>${h}</th>`);
  html += `<th>Actions</th></tr></thead><tbody>`;

  paginated.forEach((row, i) => {
    html += `<tr><td>${start + i + 1}</td>`;
    headers.forEach(h => html += `<td>${row[h] || ""}</td>`);
    html += `<td>
      <button class="btn-edit" onclick='openEditModal(${JSON.stringify(row)})'>Edit</button>
      <button class="btn-delete" onclick="deleteRow(${row.rowNumber})">Delete</button>
    </td></tr>`;
  });

  html += `</tbody></table>`;
  tableContainer.innerHTML = html;

  renderPagination(data.length);
}

/* PAGINATION */
function renderPagination(total) {
  if (rowsPerPage === "all") {
    pagination.innerHTML = "";
    return;
  }

  let pages = Math.ceil(total / rowsPerPage);
  let html = "";

  for (let i = 1; i <= pages; i++) {
    html += `<button class="${i===currentPage?'active':''}" onclick="goPage(${i})">${i}</button>`;
  }

  pagination.innerHTML = html;
}

function goPage(page) {
  currentPage = page;
  renderTable();
}

/* DELETE */
function deleteRow(rowNum) {
  if (confirm("Delete this record permanently?")) {
    const fd = new FormData();
    fd.append("action", "delete");
    fd.append("rowNumber", rowNum);

    fetch(scriptURL, { method: "POST", body: fd })
      .then(res => res.text())
      .then(() => fetchRecords());
  }
}

/* EDIT */
function openEditModal(row) {
  editRowNumber.value = row.rowNumber;
  editName.value = row["Name"] || "";
  editNIN.value = row["NIN"] || "";
  editPhone.value = row["Phone Number"] || "";
  editEmail.value = row["Email"] || "";
  editModal.style.display = "block";
}

function closeModal() {
  editModal.style.display = "none";
}

editForm.onsubmit = function(e) {
  e.preventDefault();
  saveBtn.innerText = "Saving...";

  fetch(scriptURL, { method: "POST", body: new FormData(this) })
    .then(res => res.text())
    .then(() => {
      closeModal();
      fetchRecords();
    })
    .finally(() => saveBtn.innerText = "Save");
};

  function formatDate(value) {
  if (!value) return "";

  let date = new Date(value);

  if (isNaN(date)) return value; // if not a valid date, return as-is

  let day = String(date.getDate()).padStart(2, '0');
  let month = String(date.getMonth() + 1).padStart(2, '0');
  let year = date.getFullYear();

  return `${day}/${month}/${year}`;
    }
  
async function downloadPDF() {
  const { jsPDF } = window.jspdf;

  let data = filteredData;
  if (data.length === 0) {
    alert("No data available to download.");
    return;
  }

  // Remove first & last column
  let allHeaders = Object.keys(data[0]).filter(h => h !== "rowNumber");
  let headers = allHeaders.slice(1, -1);

  const pdf = new jsPDF('l', 'mm', 'a4');

  const pageWidth = 297;
  const pageHeight = 210;
  const margin = 10;
  const usableWidth = pageWidth - margin * 2;

  let y = margin;

  // Title
  pdf.setFontSize(14);
  pdf.text("AfriFUND Application Records", pageWidth / 2, y, { align: "center" });
  y += 8;

  const searchValue = document.getElementById("searchInput").value;
  if (searchValue) {
    pdf.setFontSize(10);
    pdf.text("Filter: " + searchValue, margin, y);
    y += 6;
  }

  pdf.setFontSize(9);

  // ✅ SMART COLUMN WIDTHS
  let colWidths = [];
  colWidths.push(10); // SN

  headers.forEach(h => {
    if (h.toLowerCase().includes("name")) colWidths.push(50);
    else if (h === "NIN") colWidths.push(45);
    else if (h === "Phone Number") colWidths.push(40);
    else if (h === "Account Number") colWidths.push(40);
    else colWidths.push(30);
  });

  // Normalize
  let totalWidth = colWidths.reduce((a, b) => a + b, 0);
  let scale = usableWidth / totalWidth;
  colWidths = colWidths.map(w => w * scale);

  const rowHeight = 7;

  function drawHeader() {
    let x = margin;
    pdf.setFont(undefined, "bold");

    // SN
    pdf.rect(x, y, colWidths[0], rowHeight);
    pdf.text("SN", x + colWidths[0]/2, y + 5, { align: "center" });
    x += colWidths[0];

    headers.forEach((h, i) => {
      let headerText = h;

      // ✅ Rename headers
      if (h === "Phone Number") headerText = "Phone No.";
      if (h === "Account Number") headerText = "ACC No";

      pdf.rect(x, y, colWidths[i + 1], rowHeight);

      // ✅ CENTER HEADER TEXT
      pdf.text(headerText, x + colWidths[i + 1]/2, y + 5, { align: "center" });

      x += colWidths[i + 1];
    });

    pdf.setFont(undefined, "normal");
    y += rowHeight;
  }

  drawHeader();

  data.forEach((row, index) => {

    // Page break
    if (y + rowHeight > pageHeight - margin) {
      pdf.addPage();
      y = margin;
      drawHeader();
    }

    let x = margin;

    // SN
    pdf.rect(x, y, colWidths[0], rowHeight);
    pdf.text(String(index + 1), x + 2, y + 5);
    x += colWidths[0];

    headers.forEach((h, i) => {
      pdf.rect(x, y, colWidths[i + 1], rowHeight);

      let value = row[h];

      // Format date
      if (h.toLowerCase().includes("date")) {
        value = formatDate(value);
      }

      let text = String(value || "");

      // ✅ Better fitting (less cutting)
      let maxChars = Math.floor(colWidths[i + 1] / 2.2);

      if (text.length > maxChars) {
        text = text.substring(0, maxChars) + "...";
      }

      pdf.text(text, x + 2, y + 5);
      x += colWidths[i + 1];
    });

    y += rowHeight;
  });

  pdf.save("AfriFUND_Records.pdf");
  }
</script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</body>
</html>
