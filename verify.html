<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfriFUND Dashboard</title>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { margin: 0; background: #f4f6f9; }

/* TOP BAR */
.topbar {
  display: flex;
  align-items: center;
  background: #052;
  color: white;
  padding: 12px;
}

.menu-btn { font-size: 22px; cursor: pointer; margin-right: 10px; }

/* SIDEBAR */
.sidebar {
  position: fixed;
  top: 0;
  left: -240px;
  width: 220px;
  height: 100%;
  background: #052;
  color: white;
  padding-top: 20px;
  transition: 0.3s;
}

.sidebar.active { left: 0; }

.sidebar a {
  display: block;
  padding: 12px;
  color: white;
  text-decoration: none;
}

.sidebar a:hover { background: #0a7; }

/* OVERLAY */
.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.4);
  display: none;
}

.overlay.active { display: block; }

/* MAIN */
.main { padding: 20px; }

/* CONTROLS */
.controls {
  display: flex;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}

.search-box { position: relative; }

.search-box input {
  padding: 8px 10px 8px 35px;
  border: 1px solid #ccc;
  border-radius: 5px;
}

.search-box span {
  position: absolute;
  top: 8px;
  left: 10px;
}

/* TABLE */
.table-box {
  margin-top: 15px;
  background: white;
  border-radius: 10px;
  overflow-x: auto;
}

table { width: 100%; border-collapse: collapse; }

th, td {
  padding: 10px;
  border: 1px solid #eee;
  font-size: 13px;
}

th {
  background: #052;
  color: white;
}

/* BUTTON */
.btn-download {
  background: #052;
  color: white;
  padding: 8px 15px;
  border-radius: 5px;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="topbar">
  <span class="menu-btn" onclick="toggleSidebar()">⋮</span>
  <h3>AfriFUND Dashboard</h3>
</div>

<div class="sidebar" id="sidebar">
  <a href="index.html">📄 Applications</a>
  <a href="verify.html">🛠 Admin</a>
  <a href="admin.html">⚙ Settings</a>
</div>

<div class="overlay" id="overlay" onclick="closeSidebar()"></div>

<div class="main">

<div class="controls">
  <button class="btn-download" onclick="downloadPDF()">⬇ Download PDF</button>

  <div class="search-box">
    <span>🔍</span>
    <input type="text" id="searchInput" placeholder="Search...">
  </div>

  <select id="rowsPerPage">
    <option value="0-10">0-10</option>
    <option value="10-25">10-25</option>
    <option value="25-50">25-50</option>
    <option value="50-100">50-100</option>
    <option value="all">All</option>
  </select>
</div>

<div class="table-box" id="tableContainer"></div>

</div>

<!-- LIBRARIES -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbw7wt1Rok24XHEoRUJ1ruw9qnEBCtd_LldUFX-Zo-0toAFNoJWL27MgVTiFdg1MOk3t/exec";

let allData = [];
let filteredData = [];
let rangeMode = "0-10";

/* SIDEBAR */
function toggleSidebar() {
  sidebar.classList.toggle("active");
  overlay.classList.toggle("active");
}
function closeSidebar() {
  sidebar.classList.remove("active");
  overlay.classList.remove("active");
}

/* FETCH */
function fetchRecords() {
  fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
      allData = data;
      filteredData = data;
      renderTable();
    });
}

/* SEARCH */
searchInput.oninput = function () {
  let v = this.value.toLowerCase();
  filteredData = allData.filter(r =>
    Object.values(r).join(" ").toLowerCase().includes(v)
  );
  renderTable();
};

/* RANGE */
rowsPerPage.onchange = function () {
  rangeMode = this.value;
  renderTable();
};

/* TABLE */
function renderTable() {
  let start = 0, end = filteredData.length;

  if (rangeMode !== "all") {
    let p = rangeMode.split("-");
    start = +p[0];
    end = +p[1];
  }

  let data = filteredData.slice(start, end);

  if (!data.length) return tableContainer.innerHTML = "No records";

  let headers = Object.keys(data[0]).filter(h => h !== "rowNumber");

  let html = "<table><tr><th>SN</th>";
  headers.forEach(h => html += `<th>${h}</th>`);
  html += "</tr>";

  data.forEach((row,i) => {
    html += `<tr><td>${start+i+1}</td>`;
    headers.forEach(h => html += `<td>${row[h]||""}</td>`);
    html += "</tr>";
  });

  html += "</table>";
  tableContainer.innerHTML = html;
}

/* ✅ PDF DOWNLOAD (FULLY WORKING) */
async function downloadPDF() {
  const { jsPDF } = window.jspdf;

  if (!filteredData.length) {
    alert("No data to download");
    return;
  }

  let pdf = new jsPDF('l','mm','a4');
  let y = 10;

  pdf.setFontSize(14);
  pdf.text("AfriFUND Records", 148, y, {align:"center"});
  y += 10;

  let headers = Object.keys(filteredData[0]).filter(h => h !== "rowNumber");

  pdf.setFontSize(8);

  // Header
  let x = 10;
  pdf.text("SN", x, y); x += 10;

  headers.forEach(h => {
    pdf.text(h.substring(0,10), x, y);
    x += 30;
  });

  y += 6;

  // Rows
  filteredData.forEach((row,i) => {
    if (y > 190) {
      pdf.addPage();
      y = 10;
    }

    let x = 10;
    pdf.text(String(i+1), x, y); x += 10;

    headers.forEach(h => {
      let val = String(row[h]||"").substring(0,15);
      pdf.text(val, x, y);
      x += 30;
    });

    y += 6;
  });

  pdf.save("AfriFUND.pdf");
}

/* AUTO REFRESH */
setInterval(fetchRecords, 5000);

/* INIT */
fetchRecords();
</script>

</body>
</html>
