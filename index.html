<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="https://st2.depositphotos.com/6962450/10591/i/950/depositphotos_105914406-stock-illustration-nigeria-coat-of-arms.jpg" type="image/jpg">
  <title>JIBWIS</title>
  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    #timer { font-size: 10px; text-align:center; font-weight: bold; margin-bottom: 15px; color: red; border:1px solid black; border-radius:20px; box-shadow:inset 0px 0px 3px black; width:100%; font-family:monospace; padding: 2px; }
    body { background: linear-gradient(to top,#fff,#dbf9db); display: flex; flex-direction: column; align-items: center; margin: 0; padding: 20px; }
    .container2 { background: transparent; padding: 2rem; width: 350px; }
    .input-group, .input-groupE { margin-bottom: 1rem; }
    .input-group label, .input-groupE label { display: block; font-weight:bold; color:black; margin-bottom: 5px; font-size: 14px; }
    .input-group input, .input-group select, .input-groupE input { width: 100%; padding: 0.5rem; border-radius: 5px; border: none; background: transparent; border-bottom: 1px solid #bbb; font-size: 14px; outline: none; }
    .input-groupE input { text-transform: lowercase; }
    .input-group input { text-transform: capitalize; }
    .register-btn { width: 100%; padding: 0.7rem; border: 1px solid #fff; margin-top: 0.5rem; border-radius: 15px; background: #052; color: white; font-weight: bold; cursor: pointer; }
    .fetch-btn { width: 100%; padding: 0.7rem; border: 1px solid #052; margin-top: 1rem; border-radius: 15px; background: white; color: #052; font-weight: bold; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    .blinking { animation: blink 1s infinite; }

    .loader {
  width: 18px;
  height: 18px;
  border: 3px solid #fff;
  border-top: 3px solid transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
  margin-left: 8px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
                    }
.blinking {
  animation: blink 1s infinite;
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
      }
                    
  </style>
</head>
<body>
  <div class="container2">
    <center><img src="https://st2.depositphotos.com/6962450/10591/i/950/depositphotos_105914406-stock-illustration-nigeria-coat-of-arms.jpg" alt="Nigeria Coat of Arms" width="100"></center>
    <center><b><span style="color:navy;font-size:35px; font-family:impact;">FAG OF </span><span style="color:black; font-size:35px;">JIBWIS</span></b></center>
    <center>
  <b>
    <span style="color:black; font-size:15px; font-family:monospace;">
      NGURU, YOBE STATE
    </span>
  </b>

  <!-- 🔥 STATUS DISPLAY -->
  <div id="statusBox"
    style="margin-top:8px; font-weight:bold; font-size:14px;">
    Checking system status...
  </div>
</center>

    <form id="myForm">
      <div class="input-group">
        <label>NAME<a style="color:red">*</a></label>
        <input type="text" name="Name" required />
      </div>
      <div class="input-group">
        <label>AGE<a style="color:red">*</a></label>
        <select id="age-dropdown" name="age" required>
    <option value="">Select Age</option>
        </select>
        
      </div>
      <div class="input-group">
        <label>PHONE NUMBER<a style="color:red"></a></label>
        <input type="text"  name="Phone Number" pattern="^\d{11}" placeholder="080..." />
      </div>

      <div class="input-group">
        <label for="ADDRESS">ADDRESS<a style="color:red">*</a></label>
        <select id="ADDRESS" name="ADDRESS" required>
          
  <option value="BOMBORI">BOMBORI</option>
  <option value="BULABULIN">BULABULIN</option>
  <option value="DUMSAI">DUMSAI</option>
  <option value="GARBI">GARBI</option>
  <option value="GRA">GRA</option>
  <option value="HAUSARI">HAUSARI</option>
  <option value="NAYINAWA">NAYINAWA</option>
  <option value="NGILEWA">NGILEWA</option>
  <option value="POWER HOUSE">POWER HOUSE</option>
  <option value="SG KANURI">SG KANURI</option>
  <option value="TSOHON NGURU">TSOHON NGURU</option>
</select>
          
        
      </div>



      <button class="register-btn" id="submitBtn" type="submit">Submit</button>
    </form>
    
<script>
const ageSelect = document.getElementById('age-dropdown');

// Loop from 8 to 40
for (let i = 8; i <= 40; i++) {
    let option = document.createElement('option');
    option.value = i; // The value sent to the server (e.g., 8)
    option.textContent = i + " years"; // What the user sees (e.g., 8 years)
    ageSelect.appendChild(option);
  }
      
  

  
const scriptURL = "https://script.google.com/macros/s/AKfycbymwKgIOx7Zfy_7ux3XNElKiFG0pRYl65isN-zRyuUeFRHLQhoThK8dfGqjZtsWoFHq/exec"; 
const adminURL  = "https://script.google.com/macros/s/AKfycbwT49hK5zL3fEAD_BtlOBPRcLOuPIBW9AnullI4RmGH8TsBFq1xvmrRVB_Hbndo0I7z/exec";

const form = document.getElementById("myForm");
const submitBtn = document.getElementById("submitBtn");
const statusBox = document.getElementById("statusBox");


// ✅ CHECK ADMIN STATUS
async function checkStatus() {
  try {
    const res = await fetch(adminURL + "?settings=1");
    const data = await res.json();

    if (data.status === "Active") {
      statusBox.innerHTML = "🟢 APPLICATION IS OPEN";
      statusBox.style.color = "green";
      document.getElementById("myForm").style.display = "block";
    } else {
      statusBox.innerHTML = "🔴 APPLICATION IS CLOSED";
      statusBox.style.color = "red";
      // To hide the form
document.getElementById("myForm").style.display = "none";
      
    }

    return data.status;

  } catch (err) {
    statusBox.innerHTML = "⚠️ SYSTEM ERROR";
    statusBox.style.color = "orange";
    return "Error";
  }
}


// ✅ FORM SUBMIT
form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const status = await checkStatus();

  if (status !== "Active") {
    alert("Application is currently closed.");
    return;
  }

  // 🔥 LOADING UI + BLINKING
  submitBtn.disabled = true;
  submitBtn.classList.add("blinking");
  submitBtn.innerHTML = 'Processing <span class="loader"></span>';

  fetch(scriptURL, {
    method: "POST",
    body: new FormData(form)
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    form.reset();
  })
  .catch(() => alert("Submission failed"))
  .finally(() => {
    submitBtn.disabled = false;
    submitBtn.classList.remove("blinking");
    submitBtn.innerHTML = "Submit";
  });
});


// ✅ AUTO STATUS REFRESH
setInterval(checkStatus, 2000);
checkStatus();

  

</script>
  
</body>
</html>
