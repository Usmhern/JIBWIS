<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="https://st2.depositphotos.com/6962450/10591/i/950/depositphotos_105914406-stock-illustration-nigeria-coat-of-arms.jpg" type="image/jpg">
  <title>AfriFUND</title>

  <style>
    * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
    body {
      background: linear-gradient(to top,#dbf9db,#fff);
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 0;
      padding: 20px;
    }
    .container2 { background: transparent; padding: 1rem; width: 100%; max-width: 400px; }
    .input-group, .input-groupE { margin-bottom: 1rem; }
    .input-group label, .input-groupE label {
      display: block; font-weight:bold; color:black; margin-bottom: 5px; font-size: 14px;
    }
    .input-group input, .input-group select, .input-groupE input {
      width: 100%; padding: 0.5rem; border-radius: 5px; border: none;
      background: transparent; border-bottom: 1px solid #bbb; font-size: 14px; outline: none;
    }
    .register-btn {
      width: 100%; padding: 0.7rem; border: 1px solid #fff;
      margin-top: 10px; border-radius: 15px; font-weight: bold;
      cursor: pointer;
      background: #052; color: white;
    }

    @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    .blinking { animation: blink 1s infinite; }
    #timer { font-size: 12px; text-align:center; color: red; margin-bottom: 10px; font-family: monospace; }
  </style>
</head>

<body>

<div class="container2">
<center><img src="https://st2.depositphotos.com/6962450/10591/i/950/depositphotos_105914406-stock-illustration-nigeria-coat-of-arms.jpg" width="100"></center>
<center><b><span style="color:navy;font-size:40px;font-family:impact;">Afri</span><span style="color:black;font-size:45px;">FUND</span></b></center>
<center><b><i style="color:green;font-size:15px;font-family:monospace;">For Nigerians...</i></b></center>

<div id="timer">SUBMISSION PORTAL ACTIVE</div>

<form id="myForm">

<div class="input-group">
<label>Your Name</label>
<input type="text" name="Name" required>
</div>

<div class="input-group">
<label>Date Of Birth</label>
<input type="date" name="Date of Birth" required>
</div>

<div class="input-group">
<label>Phone Number</label>
<input type="text" name="Phone Number" pattern="\d{11}" required>
</div>

<div class="input-groupE">
<label>Email</label>
<input type="email" name="Email" required>
</div>

<div class="input-group">
<label>NIN</label>
<input type="text" name="NIN" pattern="\d{11}" required>
</div>

<div class="input-group">
<label>State</label>
<select id="State" name="State" required></select>
</div>

<div class="input-group">
<label>LGA</label>
<select id="LGA" name="LGA" required>
<option>Select State First</option>
</select>
</div>

<div class="input-group">
<label>Account Number</label>
<input type="text" name="Account Number" pattern="\d{10}" required>
</div>

<div class="input-group">
<label>Select Your Bank</label>
<select name="Bank" id="bankSelect" required></select>
</div>

<button class="register-btn" id="submitBtn">Submit Registration</button>

</form>
</div>

<script>
const scriptURL = 'YOUR_GOOGLE_SCRIPT_URL';
const form = document.getElementById('myForm');
const submitBtn = document.getElementById('submitBtn');

// ================== SUBMIT ==================
form.addEventListener('submit', e => {
  e.preventDefault();

  submitBtn.disabled = true;
  submitBtn.innerHTML = "Uploading...";
  submitBtn.classList.add('blinking');

  fetch(scriptURL, { method: 'POST', body: new FormData(form)})
    .then(res => res.text())
    .then(result => {
      if (result === "Already Registered") {
        alert("❌ Denied: This NIN is already registered.");
      } else {
        alert("✅ Registration Successful!");
        form.reset();
      }
    })
    .catch(error => alert("Error: " + error.message))
    .finally(() => {
      submitBtn.disabled = false;
      submitBtn.innerHTML = "Submit Registration";
      submitBtn.classList.remove('blinking');
    });
});


// ================== STATES + LGAs API ==================
const stateSelect = document.getElementById("State");
const lgaSelect = document.getElementById("LGA");

// Load States

// ================== STATIC STATES ==================
const states = [
"Abia","Adamawa","Akwa Ibom","Anambra","Bauchi","Bayelsa","Benue",
"Borno","Cross River","Delta","Ebonyi","Edo","Ekiti","Enugu","Gombe",
"Imo","Jigawa","Kaduna","Kano","Katsina","Kebbi","Kogi","Kwara",
"Lagos","Nasarawa","Niger","Ogun","Ondo","Osun","Oyo","Plateau",
"Rivers","Sokoto","Taraba","Yobe","Zamfara","FCT"
];

stateSelect.innerHTML = '<option value="">Select State</option>';

states.forEach(state => {
  let opt = document.createElement("option");
  opt.value = state;
  opt.textContent = state;
  stateSelect.appendChild(opt);
});
  
// Load LGAs
  stateSelect.addEventListener("change", () => {
  const state = stateSelect.value;

  lgaSelect.innerHTML = "<option>Loading...</option>";

  // PRIMARY API
  fetch(`https://nga-states-lga.onrender.com/?state=${state}`)
    .then(res => res.json())
    .then(data => {
      if (!data || data.length === 0) throw "API failed";

      populateLGAs(data);
    })
    .catch(() => {
      console.log("API failed, using fallback...");

      // FALLBACK DATA (100% WORKING)
      if (fallbackLGA[state]) {
        populateLGAs(fallbackLGA[state]);
      } else {
        lgaSelect.innerHTML = "<option>No LGA found</option>";
      }
    });
});

function populateLGAs(lgas) {
  lgaSelect.innerHTML = '<option value="">Select LGA</option>';

  lgas.forEach(lga => {
    let opt = document.createElement("option");
    opt.value = lga;
    opt.textContent = lga;
    lgaSelect.appendChild(opt);
  });
}

// ================== BANK LIST ==================
const banks = [
"Access Bank","Citibank","Ecobank","Fidelity Bank","First Bank",
"FCMB","Globus Bank","GTBank","Heritage Bank","Jaiz Bank",
"Keystone Bank","Kuda Bank","Moniepoint","Opay","Parallex Bank",
"Polaris Bank","Providus Bank","Stanbic IBTC","Standard Chartered",
"Sterling Bank","Suntrust Bank","TAJ Bank","Union Bank","UBA",
"Unity Bank","Wema Bank","Zenith Bank"
];

const bankSelect = document.getElementById("bankSelect");
bankSelect.innerHTML = '<option value="">Select Bank</option>';

banks.forEach(bank => {
  let opt = document.createElement("option");
  opt.value = bank;
  opt.textContent = bank;
  bankSelect.appendChild(opt);
});
</script>

</body>
</html>
