<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AfriFUND</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(#dbf9db,#fff);
  padding:20px;
  display:flex;
  justify-content:center;
}
.container {
  width:100%;
  max-width:400px;
}
input, select {
  width:100%;
  padding:10px;
  margin-bottom:12px;
  border:none;
  border-bottom:1px solid #ccc;
}
button {
  width:100%;
  padding:12px;
  background:#052;
  color:white;
  border:none;
  border-radius:10px;
}
</style>
</head>

<body>

<div class="container">
<h2>AfriFUND Registration</h2>

<form id="myForm">

<input type="text" name="Name" placeholder="Full Name" required>

<input type="date" name="Date of Birth" required>

<input type="text" name="Phone Number" pattern="\d{11}" placeholder="08012345678" required>

<input type="email" name="Email" required>

<input type="text" name="NIN" pattern="\d{11}" placeholder="NIN" required>

<select id="stateSelect" name="State" required>
<option value="">Loading States...</option>
</select>

<select id="lgaSelect" name="LGA" required>
<option value="">Select State First</option>
</select>

<input type="text" name="Account Number" pattern="\d{10}" placeholder="Account Number" required>

<select id="bankSelect" name="Bank" required></select>

<button type="submit">Submit Registration</button>

</form>
</div>

<script>
const scriptURL = "YOUR_GOOGLE_SCRIPT_URL";
const form = document.getElementById("myForm");

// =======================
// SUBMIT FORM
// =======================
form.addEventListener("submit", e => {
  e.preventDefault();

  fetch(scriptURL, { method: 'POST', body: new FormData(form)})
    .then(res => res.text())
    .then(result => {
      if (result === "Already Registered") {
        alert("❌ Denied: This NIN is already registered.");
      } else {
        alert("✅ Registration Successful!");
        form.reset();
      }
    })
    .catch(err => alert("Error: " + err));
});


// =======================
// LOAD STATES + LGAs API
// =======================
const stateSelect = document.getElementById("stateSelect");
const lgaSelect = document.getElementById("lgaSelect");

// Fetch all states
fetch("https://nigerian-states-info.herokuapp.com/api/v1/states")
  .then(res => res.json())
  .then(data => {
    stateSelect.innerHTML = '<option value="">Select State</option>';
    
    data.data.forEach(state => {
      let opt = document.createElement("option");
      opt.value = state.name;
      opt.textContent = state.name;
      stateSelect.appendChild(opt);
    });
  });

// When state changes → load LGAs
stateSelect.addEventListener("change", () => {
  const selectedState = stateSelect.value;

  lgaSelect.innerHTML = '<option>Loading LGAs...</option>';

  fetch(`https://nigerian-states-info.herokuapp.com/api/v1/states/${selectedState}/lgas`)
    .then(res => res.json())
    .then(data => {
      lgaSelect.innerHTML = '<option value="">Select LGA</option>';

      data.data.forEach(lga => {
        let opt = document.createElement("option");
        opt.value = lga;
        opt.textContent = lga;
        lgaSelect.appendChild(opt);
      });
    })
    .catch(() => {
      lgaSelect.innerHTML = '<option>Error loading LGAs</option>';
    });
});


// =======================
// FULL BANK LIST
// =======================
const banks = [
"Access Bank","Citibank","Ecobank","Fidelity Bank","First Bank",
"FCMB","Globus Bank","GTBank","Heritage Bank","Jaiz Bank",
"Keystone Bank","Kuda Bank","Moniepoint","Opay","Parallex Bank",
"Polaris Bank","Providus Bank","Stanbic IBTC","Standard Chartered",
"Sterling Bank","Suntrust Bank","TAJ Bank","Union Bank","UBA",
"Unity Bank","Wema Bank","Zenith Bank"
];

const bankSelect = document.getElementById("bankSelect");
bankSelect.innerHTML = '<option value="">Select Bank</option>';

banks.forEach(bank => {
  let opt = document.createElement("option");
  opt.value = bank;
  opt.textContent = bank;
  bankSelect.appendChild(opt);
});
</script>

</body>
</html>
