<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="icon" href="20251223_194733.png" type="image/png">
<title>JIBWIS</title>

<style>
:root{
  --bg: #fff;
  --text: black;
  --card: transparent;
  --input-border: #bbb;
  --btn-bg: #052;
  --btn-text: white;
}

*{
  box-sizing: border-box;
  font-family: 'Segoe UI', sans-serif;
}

body{
  background: var(--bg);
  color: var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  margin:0;
  padding:20px;
}

.input-group{
  margin-bottom:1rem;
}

.input-group label{
  display:block;
  font-weight:bold;
  margin-bottom:5px;
  font-size:14px;
}

.input-group input,
.input-group select{
  width:100%;
  padding:0.5rem;
  border:none;
  border-bottom:1px solid var(--input-border);
  background:transparent;
  outline:none;
  font-size:14px;
}

.register-btn{
  width:100%;
  padding:0.7rem;
  border-radius:15px;
  background:var(--btn-bg);
  color:var(--btn-text);
  font-weight:bold;
  cursor:pointer;
}

button:disabled{
  opacity:0.6;
  cursor:not-allowed;
}

.loader{
  width:18px;
  height:18px;
  border:3px solid #fff;
  border-top:3px solid transparent;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  display:inline-block;
  margin-left:8px;
}

@keyframes spin{
  0%{transform:rotate(0deg);}
  100%{transform:rotate(360deg);}
}

.blinking{
  animation: blink 1s infinite;
}

@keyframes blink{
  0%{opacity:1;}
  50%{opacity:0.3;}
  100%{opacity:1;}
}

.container2{
  position:relative;
  width:350px;
  padding:2rem;
  border-radius:10px;
  box-shadow:0 0 5px black;
  overflow:hidden;
}

.container2::before{
  content:"";
  position:absolute;
  top:60%;
  left:50%;
  width:280px;
  height:280px;
  background:url('jibwis.png') no-repeat center;
  background-size:contain;
  transform:translate(-50%, -50%);
  opacity:0.3;
  pointer-events:none;
  z-index:0;
}

.container2 *{
  position:relative;
  z-index:1;
}
</style>
</head>

<body>

<div class="container2">

<center>
<img src="20251223_194733.png" width="200" style="border-radius:100%;">
</center>

<center>
<b>
<span style="color:#36d;font-size:27px;-webkit-text-stroke:1px orange;font-family:impact;">
FAG OF JIBWIS NGURU
</span>
</b>
</center>

<center>
<label style="color:grey;font-size:15px;font-family:monospace;">
RECRUITMENT PORTAL
</label>

<div id="statusBox" style="margin-top:8px;font-weight:bold;font-size:14px;">
Checking system status...
</div>
<br><br>
</center>

<form id="myForm">

<div class="input-group">
<label>NAME <span style="color:red">*</span></label>
<input type="text" name="Name" required>
</div>

<div class="input-group">
<label>AGE <span style="color:red">*</span></label>
<select id="age-dropdown" name="age" required>
<option value="">Select Age</option>
</select>
</div>

<div class="input-group">
<label>PHONE NUMBER</label>
<input type="tel" name="Phone Number" pattern="^\d{11}" placeholder="080...">
</div>

<div class="input-group">
<label>ADDRESS <span style="color:red">*</span></label>
<select name="ADDRESS" required>
<option value="">Select Address</option>
<option value="BOMBORI">BOMBORI</option>
<option value="BULABULIN">BULABULIN</option>
<option value="DUMSAI">DUMSAI</option>
<option value="GARBI">GARBI</option>
<option value="GRA">GRA</option>
<option value="HAUSARI">HAUSARI</option>
<option value="NAYINAWA">NAYINAWA</option>
<option value="NGILEWA">NGILEWA</option>
<option value="POWER HOUSE">POWER HOUSE</option>
<option value="SG KANURI">SG KANURI</option>
<option value="TSOHON NGURU">TSOHON NGURU</option>
</select>
</div>

<button class="register-btn" id="submitBtn" type="submit">
SUBMIT
</button>

</form>
</div>

<script>
const ageSelect = document.getElementById("age-dropdown");

for(let i=8;i<=40;i++){
  let opt=document.createElement("option");
  opt.value=i;
  opt.textContent=i+" years";
  ageSelect.appendChild(opt);
}

const scriptURL = "https://script.google.com/macros/s/AKfycbwWkfBWnZw7nC1I7QqrlRJEO-sD7AGUaPbh9pnTj_MjvNSK06zkSgH_f5DX-zyhqXkt/exec";
const adminURL  = "https://script.google.com/macros/s/AKfycbwT49hK5zL3fEAD_BtlOBPRcLOuPIBW9AnullI4RmGH8TsBFq1xvmrRVB_Hbndo0I7z/exec";

const form = document.getElementById("myForm");
const submitBtn = document.getElementById("submitBtn");
const statusBox = document.getElementById("statusBox");

async function checkStatus(){
  try{
    const res = await fetch(adminURL + "?settings=1&nocache=" + Date.now());
    const data = await res.json();

    if(data.status === "Active"){
      statusBox.innerHTML = "🟢 APPLICATION IS OPEN";
      statusBox.style.color = "green";
      form.style.display = "block";
    }else{
      statusBox.innerHTML = "🔴 APPLICATION IS CLOSED";
      statusBox.style.color = "red";
      form.style.display = "none";
    }

    return data.status;

  }catch(err){
    statusBox.innerHTML = "⚠️ SYSTEM ERROR";
    statusBox.style.color = "orange";
    return "Error";
  }
}

// FORM SUBMIT
form.addEventListener("submit", async (e)=>{
  e.preventDefault();

  const status = await checkStatus();

  if(status !== "Active"){
    alert("Application is closed");
    return;
  }

  submitBtn.disabled = true;
  submitBtn.classList.add("blinking");
  submitBtn.innerHTML = 'Processing <span class="loader"></span>';

  fetch(scriptURL,{
    method:"POST",
    body:new FormData(form)
  })
  .then(r=>r.text())
  .then(msg=>{
    alert(msg);
    form.reset();
  })
  .catch(()=>{
    alert("Submission failed");
  })
  .finally(()=>{
    submitBtn.disabled = false;
    submitBtn.classList.remove("blinking");
    submitBtn.innerHTML = "SUBMIT";
  });
});

// AUTO CHECK
checkStatus();
setInterval(checkStatus, 2000);
</script>

</body>
</html>
