    function loadLgas() {
      const stateSel = document.getElementById("State").value;
      const lgaSel = document.getElementById("LGA");
      lgaSel.innerHTML = '<option value=""></option>';
      if (lgas[stateSel]) {
        lgas[stateSel].forEach(lga => {
          let opt = document.createElement("option");
          opt.value = lga;
          opt.innerHTML = lga;
          lgaSel.appendChild(opt);
        });
      }
    }
