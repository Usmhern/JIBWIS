<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="20251223_194733.png" type="image/png">
  <title>JIBWIS</title>
<style>
:root{
  --bg: #fff);
  --text: black;
  --card: transparent;
  --input-border: #bbb;
  --btn-bg: #052;
  --btn-text: white;
}

/* DARK MODE VARIABLES */
body.dark{
  --bg: #fff;
  --text: white;
  --card: #111;
  --input-border: #444;
  --btn-bg: #0a7;
  --btn-text: white;
}

* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }

body {
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
  align-items: center;
  margin: 0;
  padding: 20px;
  transition: 0.4s;
}

.container2 {
  background: var(--card);
  padding: 2rem;
  width: 350px;
  border-radius: 15px;
  transition: 0.4s;
}

.input-group, .input-groupE { margin-bottom: 1rem; }

.input-group label {
  display: block;
  font-weight:bold;
  color: var(--text);
  margin-bottom: 5px;
  font-size: 14px;
}

.input-group input,
.input-group select {
  width: 100%;
  padding: 0.5rem;
  border-radius: 5px;
  border: none;
  background: transparent;
  border-bottom: 1px solid var(--input-border);
  font-size: 14px;
  outline: none;
  color: var(--text);
}

.register-btn {
  width: 100%;
  padding: 0.7rem;
  border-radius: 15px;
  background: var(--btn-bg);
  color: var(--btn-text);
  font-weight: bold;
  cursor: pointer;
}

button:disabled { opacity: 0.6; cursor: not-allowed; }

/* LOADER */
.loader {
  width: 18px;
  height: 18px;
  border: 3px solid #fff;
  border-top: 3px solid transparent;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  display: inline-block;
  margin-left: 8px;
}

@keyframes spin {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

@keyframes blink {
  0% { opacity: 1; }
  50% { opacity: 0.3; }
  100% { opacity: 1; }
}

.blinking {
  animation: blink 1s infinite;
}
  .container2 {
  position: relative; /* important */
  background: var(--card);
  padding: 2rem;
  width: 350px;
  border-radius: 15px;
  transition: 0.4s;
  overflow: hidden;
}

/* 🔥 BACKGROUND WATERMARK IMAGE */
.container2::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  width: 250px;
  height: 250px;
  background: url('jibwis.png') no-repeat center;
  background-size: contain;
  
  transform: translate(-50%, -50%);
  
  opacity: 0.08; /* adjust transparency here */
  
  pointer-events: none; /* allows clicking through */
  z-index: 0;
}

/* Make sure content stays above */
.container2 * {
  position: relative;
  z-index: 1;
  }
</style>
</head>
<body>
  <div class="container2">
    <center><img src="20251223_194733.png" alt="JIBWIS" width="200" style="border-radius:100%;"></center>
        <center><b><span style="color:blue;font-size:35px; font-family:impact;">FAG OF </span><span style="color:blue; font-size:35px;">JIBWIS</span></b></center>
    <center>
  <b>
    <label style="color:black; font-size:15px; font-family:monospace;">
      NGURU, YOBE STATE.
    </label>
  </b>
<button id="themeToggle" style="
  width:100%;
  margin-bottom:10px;
  padding:8px;
  border-radius:20px;
  border:none;
  background:#222;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
">
  🌙 Dark Mode
</button>
  <!-- 🔥 STATUS DISPLAY -->
  <div id="statusBox"
    style="margin-top:8px; font-weight:bold; font-size:14px;">
    Checking system status...
  </div>
</center>

    <form id="myForm">
      <div class="input-group">
        <label>NAME<a style="color:red">*</a></label>
        <input type="text" name="Name" required />
      </div>
      <div class="input-group">
        <label>AGE<a style="color:red">*</a></label>
        <select id="age-dropdown" name="age" required>
    <option value="">Select Age</option>
        </select>
        
      </div>
      <div class="input-group">
        <label>PHONE NUMBER<a style="color:red"></a></label>
        <input type="tel"  name="Phone Number" pattern="^\d{11}" placeholder="080..." />
      </div>

      <div class="input-group">
        <label for="ADDRESS">ADDRESS<a style="color:red">*</a></label>
        <select id="ADDRESS" name="ADDRESS" required>
        <option value="">Select Address</option>    
  <option value="BOMBORI">BOMBORI</option>
  <option value="BULABULIN">BULABULIN</option>
  <option value="DUMSAI">DUMSAI</option>
  <option value="GARBI">GARBI</option>
  <option value="GRA">GRA</option>
  <option value="HAUSARI">HAUSARI</option>
  <option value="NAYINAWA">NAYINAWA</option>
  <option value="NGILEWA">NGILEWA</option>
  <option value="POWER HOUSE">POWER HOUSE</option>
  <option value="SG KANURI">SG KANURI</option>
  <option value="TSOHON NGURU">TSOHON NGURU</option>
</select>
          
        
      </div>



      <button class="register-btn" id="submitBtn" type="submit">SUBMIT</button>
    </form>
    <script>
const ageSelect = document.getElementById('age-dropdown');

// Loop from 8 to 40
for (let i = 8; i <= 40; i++) {
    let option = document.createElement('option');
    option.value = i; // The value sent to the server (e.g., 8)
    option.textContent = i + " years"; // What the user sees (e.g., 8 years)
    ageSelect.appendChild(option);
  }
      
  
const toggleBtn = document.getElementById("themeToggle");

// Load saved theme
if (localStorage.getItem("theme") === "dark") {
  document.body.classList.add("dark");
  toggleBtn.innerHTML = "☀️ Light Mode";
}

// Toggle theme
toggleBtn.addEventListener("click", () => {
  document.body.classList.toggle("dark");

  if (document.body.classList.contains("dark")) {
    localStorage.setItem("theme", "dark");
    toggleBtn.innerHTML = "☀️ Light Mode";
  } else {
    localStorage.setItem("theme", "light");
    toggleBtn.innerHTML = "🌙 Dark Mode";
  }
});

  
const scriptURL = "https://script.google.com/macros/s/AKfycbwWkfBWnZw7nC1I7QqrlRJEO-sD7AGUaPbh9pnTj_MjvNSK06zkSgH_f5DX-zyhqXkt/exec"; 
const adminURL  = "https://script.google.com/macros/s/AKfycbwT49hK5zL3fEAD_BtlOBPRcLOuPIBW9AnullI4RmGH8TsBFq1xvmrRVB_Hbndo0I7z/exec";

const form = document.getElementById("myForm");
const submitBtn = document.getElementById("submitBtn");
const statusBox = document.getElementById("statusBox");


// ✅ CHECK ADMIN STATUS
async function checkStatus() {
  try {
    const res = await fetch(adminURL + "?settings=1");
    const data = await res.json();

    if (data.status === "Active") {
      statusBox.innerHTML = "🟢 APPLICATION IS OPEN";
      statusBox.style.color = "green";
      document.getElementById("myForm").style.display = "block";
    } else {
      statusBox.innerHTML = "🔴 APPLICATION IS CLOSED";
      statusBox.style.color = "red";
      // To hide the form
document.getElementById("myForm").style.display = "none";
      
    }

    return data.status;

  } catch (err) {
    statusBox.innerHTML = "⚠️ SYSTEM ERROR";
    statusBox.style.color = "orange";
    return "Error";
  }
}


// ✅ FORM SUBMIT
form.addEventListener("submit", async function(e) {
  e.preventDefault();

  const status = await checkStatus();

  if (status !== "Active") {
    alert("Application is currently closed.");
    return;
  }

  // 🔥 LOADING UI + BLINKING
  submitBtn.disabled = true;
  submitBtn.classList.add("blinking");
  submitBtn.innerHTML = 'Processing <span class="loader"></span>';

  fetch(scriptURL, {
    method: "POST",
    body: new FormData(form)
  })
  .then(res => res.text())
  .then(msg => {
    alert(msg);
    form.reset();
  })
  .catch(() => alert("Submission failed"))
  .finally(() => {
    submitBtn.disabled = false;
    submitBtn.classList.remove("blinking");
    submitBtn.innerHTML = "Submit";
  });
});


// ✅ AUTO STATUS REFRESH
setInterval(checkStatus, 2000);
checkStatus();

  

</script>
  
</body>
</html>
