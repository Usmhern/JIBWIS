<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIBWIS Control</title>

<style>
body {
  font-family: Arial;
  background: linear-gradient(135deg,#0a3d2f,#0c5c45);
  margin: 0;
  color: #333;
}

/* TOP BAR */
.topbar {
  display: flex;
  align-items: center;
  background: #052;
  color: white;
  padding: 12px;
  position: relative;
}

.menu-btn {
  font-size: 20px;
  cursor: pointer;
}

/* MENU */
.menu {
  position: absolute;
  top: 50px;
  left: 10px;
  background: white;
  border-radius: 8px;
  display: none;
  box-shadow: 0 5px 15px rgba(0,0,0,0.2);
  overflow: hidden;
}

.menu a {
  display: block;
  padding: 12px;
  text-decoration: none;
  color: #333;
}

.menu a:hover {
  background: #f0f0f0;
}

/* MAIN CARD */
.container {
  max-width: 500px;
  margin: 30px auto;
  background: white;
  padding: 20px;
  border-radius: 12px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.2);
}

h2 {
  text-align: center;
  color: #052;
}

/* STATUS */
.status {
  text-align: center;
  font-weight: bold;
  margin: 15px 0;
  padding: 12px;
  border-radius: 8px;
  font-size: 16px;
}

/* BUTTONS */
.btn {
  width: 100%;
  padding: 12px;
  margin: 8px 0;
  border: none;
  color: white;
  font-size: 14px;
  cursor: pointer;
  border-radius: 6px;
  transition: 0.2s;
}

.btn:hover { opacity: 0.9; }

.green { background: #0a8f3c; }
.red { background: #d62828; }
.blue { background: #052; }

/* INPUT */
input {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 6px;
  border: 1px solid #ccc;
}

/* SMALL TEXT */
.small {
  font-size: 12px;
  text-align: center;
  color: gray;
  margin-top: 10px;
}
</style>
</head>

<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div style="margin-left:10px;">JIBWIS CONTROL PANEL</div>

  <div id="menu" class="menu">
    <a href="index.html">📖 APPLICATION FORM</a>
    <a href="data.html">📚 ADMIN DATA</a>
    <a href="admin.html">⚙️ SETTINGS</a>
  </div>
</div>

<div class="container">

<h2>FORM SETTINGS</h2>

<div id="statusBox" class="status">Loading...</div>

<button class="btn green" onclick="setStatus('Active')">ACTIVATE FORM</button>
<button class="btn red" onclick="setStatus('Inactive')">DEACTIVATE FORM</button>

<hr>

<h3 style="text-align:center;">Schedule Form</h3>

<label>Open Time</label>
<input type="time" id="openTime">

<label>Close Time</label>
<input type="time" id="closeTime">

<button class="btn blue" onclick="saveSchedule()">SAVE SCHEDULE</button>

<div class="small">Auto system checks every second</div>

</div>
<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbwT49hK5zL3fEAD_BtlOBPRcLOuPIBW9AnullI4RmGH8TsBFq1xvmrRVB_Hbndo0I7z/exec";

let openTime = "";
let closeTime = "";
let lastState = ""; // prevent repeated trigger

/* LOAD SETTINGS */
async function loadStatus() {
  try {
    const res = await fetch(scriptURL + "?settings=1");
    const data = await res.json();

    openTime = data.openTime || "";
    closeTime = data.closeTime || "";

    document.getElementById("openTime").value = openTime;
    document.getElementById("closeTime").value = closeTime;

    lastState = data.status || "Inactive";
    updateUI(lastState);

  } catch {
    document.getElementById("statusBox").innerHTML = "⚠️ Error loading";
  }
}

/* UPDATE UI */
function updateUI(state){
  const box = document.getElementById("statusBox");

  if (state === "Active") {
    box.innerHTML = "🟢 FORM IS ACTIVE";
    box.style.background = "#d4f8d4";
    box.style.color = "green";
  } else {
    box.innerHTML = "🔴 FORM IS INACTIVE";
    box.style.background = "#ffd6d6";
    box.style.color = "red";
  }
}

/* SEND STATUS ONLY WHEN CHANGED */
function updateServer(state){
  let fd = new FormData();
  fd.append("action", "setStatus");
  fd.append("status", state);

  fetch(scriptURL, { method: "POST", body: fd })
    .then(() => {
      lastState = state;
      updateUI(state);
      console.log("Updated:", state);
    });
}

/* 🔥 SMART SCHEDULE ENGINE */
function checkSchedule(){
  if(!openTime || !closeTime) return;

  const now = new Date();
  const current = now.getHours()*60 + now.getMinutes();

  const [oh, om] = openTime.split(":").map(Number);
  const [ch, cm] = closeTime.split(":").map(Number);

  const open = oh*60 + om;
  const close = ch*60 + cm;

  let newState;

  if(current >= open && current < close){
    newState = "Active";
  } else {
    newState = "Inactive";
  }

  // 🔥 ONLY TRIGGER IF CHANGED
  if(newState !== lastState){
    updateServer(newState);
  }
}

/* SAVE SCHEDULE */
function saveSchedule() {
  let fd = new FormData();
  fd.append("action", "setSchedule");
  fd.append("openTime", document.getElementById("openTime").value);
  fd.append("closeTime", document.getElementById("closeTime").value);

  fetch(scriptURL, { method: "POST", body: fd })
    .then(res => res.text())
    .then(msg => {
      alert("✅ Saved. Auto system started.");
      loadStatus(); // reload values immediately
    });
}

/* MANUAL CONTROL */
function setStatus(state){
  updateServer(state);
}

/* START ENGINE */
loadStatus();
setInterval(checkSchedule, 1000); // every second

</script>

</body>
</html>
