<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIBWIS Control</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0a3d2f,#0c5c45);
}

.topbar{
  background:#052;
  color:#fff;
  padding:12px;
  display:flex;
  align-items:center;
}

.menu-btn{
  font-size:20px;
  cursor:pointer;
}

.menu{
  position:absolute;
  top:50px;
  left:10px;
  background:#fff;
  display:none;
  border-radius:8px;
}

.menu a{
  display:block;
  padding:10px;
  text-decoration:none;
  color:#333;
}

.container{
  max-width:500px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:10px;
}

.status{
  text-align:center;
  padding:10px;
  margin:10px 0;
  border-radius:6px;
  font-weight:bold;
}

.btn{
  width:100%;
  padding:12px;
  margin:5px 0;
  border:none;
  color:#fff;
  border-radius:6px;
  cursor:pointer;
}

.green{background:green;}
.red{background:red;}
.blue{background:#052;}

input{
  width:100%;
  padding:10px;
  margin:5px 0;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div style="margin-left:10px;">JIBWIS CONTROL</div>
</div>

<div id="menu" class="menu">
  <a href="index.html">📖 APPLICATION FORM</a>
  <a href="data.html">📚 ADMIN DATA</a>
  <a href="admin.html">⚙️ SETTINGS</a>
</div>

<div class="container">

<h2 style="text-align:center;">FORM SETTINGS</h2>

<div id="statusBox" class="status">Loading...</div>

<button class="btn green" onclick="manualSet('Active')">ACTIVATE</button>
<button class="btn red" onclick="manualSet('Inactive')">DEACTIVATE</button>

<hr>

<h3 style="text-align:center;">Schedule</h3>

<label>Open Time</label>
<input type="time" id="openTime">

<label>Close Time</label>
<input type="time" id="closeTime">

<button class="btn blue" onclick="saveSchedule()">SAVE SCHEDULE</button>

<label style="display:flex;align-items:center;margin-top:10px;">
  <input type="checkbox" id="autoToggle" onchange="toggleAuto(this)">
  Enable Auto Schedule
</label>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbwT49hK5zL3fEAD_BtlOBPRcLOuPIBW9AnullI4RmGH8TsBFq1xvmrRVB_Hbndo0I7z/exec";

let openTime = "";
let closeTime = "";
let lastState = "";
let scheduleEnabled = false;

/* MENU */
function toggleMenu(){
  let m = document.getElementById("menu");
  m.style.display = (m.style.display==="block")?"none":"block";
}

/* LOAD ONCE ONLY */
async function loadData(){
  try{
    let res = await fetch(scriptURL+"?settings=1");
    let data = await res.json();

    openTime = data.openTime || "";
    closeTime = data.closeTime || "";
    lastState = data.status || "Inactive";
    scheduleEnabled = data.scheduleEnabled === "true";

    // SET INPUT ONLY ONCE
    document.getElementById("openTime").value = openTime;
    document.getElementById("closeTime").value = closeTime;
    document.getElementById("autoToggle").checked = scheduleEnabled;

    updateUI(lastState);

  }catch{
    document.getElementById("statusBox").innerHTML="Error loading";
  }
}

/* UI */
function updateUI(state){
  let box = document.getElementById("statusBox");

  if(state==="Active"){
    box.innerHTML="🟢 ACTIVE";
    box.style.background="#d4f8d4";
    box.style.color="green";
  }else{
    box.innerHTML="🔴 INACTIVE";
    box.style.background="#ffd6d6";
    box.style.color="red";
  }
}

/* SEND STATUS */
function sendStatus(state){
  let fd=new FormData();
  fd.append("action","setStatus");
  fd.append("status",state);

  fetch(scriptURL,{method:"POST",body:fd})
  .then(()=>{
    lastState=state;
    updateUI(state);
  });
}

/* MANUAL */
function manualSet(state){
  scheduleEnabled=false;
  document.getElementById("autoToggle").checked=false;
  sendStatus(state);
}

/* SAVE SCHEDULE */
function saveSchedule(){
  let fd=new FormData();
  fd.append("action","setSchedule");
  fd.append("openTime",document.getElementById("openTime").value);
  fd.append("closeTime",document.getElementById("closeTime").value);

  fetch(scriptURL,{method:"POST",body:fd})
  .then(()=>alert("Saved successfully"));
}

/* TOGGLE AUTO */
function toggleAuto(el){
  scheduleEnabled=el.checked;
}

/* AUTO ENGINE */
function runSchedule(){

  if(!scheduleEnabled) return;
  if(!openTime || !closeTime) return;

  let now=new Date();
  let current=now.getHours()*60+now.getMinutes();

  let [oh,om]=openTime.split(":").map(Number);
  let [ch,cm]=closeTime.split(":").map(Number);

  let open=oh*60+om;
  let close=ch*60+cm;

  let newState=(current>=open && current<close)?"Active":"Inactive";

  if(newState!==lastState){
    sendStatus(newState);
  }
}

/* START */
loadData();
setInterval(runSchedule,1000);

</script>

</body>
</html>
