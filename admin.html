<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIBWIS Control Panel</title>

<style>
body{
  margin:0;
  font-family: 'Segoe UI', Tahoma;
  background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:#fff;
}

/* TOPBAR */
.topbar{
  display:flex;
  align-items:center;
  padding:15px 20px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
}

.menu-btn{
  font-size:22px;
  cursor:pointer;
}

.menu{
  position:absolute;
  top:60px;
  left:20px;
  background:#fff;
  color:#000;
  border-radius:10px;
  display:none;
  overflow:hidden;
}

.menu a{
  display:block;
  padding:12px 20px;
  text-decoration:none;
  color:#333;
}

.menu a:hover{
  background:#eee;
}

/* CARD */
.container{
  max-width:500px;
  margin:40px auto;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  padding:25px;
  border-radius:15px;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* STATUS */
.status{
  text-align:center;
  padding:15px;
  border-radius:10px;
  font-weight:bold;
  margin-bottom:15px;
}

/* BUTTONS */
.btn{
  width:100%;
  padding:14px;
  margin-top:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.green{background:#27ae60;color:#fff;}
.red{background:#e74c3c;color:#fff;}
.blue{background:#3498db;color:#fff;}

/* INPUT */
input{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:none;
}

/* LABEL */
label{
  margin-top:15px;
  display:block;
  font-size:14px;
}

/* INFO */
.info{
  font-size:13px;
  margin-top:10px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="menu-btn" onclick="toggleMenu()">☰</div>
  <div style="margin-left:10px;font-weight:bold;">JIBWIS CONTROL PANEL</div>
</div>

<div id="menu" class="menu">
  <a href="index.html">📖 Application Form</a>
  <a href="data.html">📚 Admin Data</a>
  <a href="admin.html">⚙ Settings</a>
</div>

<div class="container">

<h2 style="text-align:center;">Form Control</h2>

<div id="statusBox" class="status">Loading...</div>

<button class="btn green" onclick="manualSet('Active')">Activate</button>
<button class="btn red" onclick="manualSet('Inactive')">Deactivate</button>

<hr>

<h3>Schedule Setup</h3>

<label>Open Date & Time</label>
<input type="datetime-local" id="openTime">

<label>Close Date & Time</label>
<input type="datetime-local" id="closeTime">

<button class="btn blue" onclick="saveSchedule()">Save Schedule</button>

<label style="margin-top:15px;">
  <input type="checkbox" id="autoToggle" onchange="toggleAuto(this)">
  Enable Automatic Scheduling
</label>

<div class="info" id="scheduleInfo"></div>

</div>

<script>

const scriptURL = "https://script.google.com/macros/s/AKfycbwT49hK5zL3fEAD_BtlOBPRcLOuPIBW9AnullI4RmGH8TsBFq1xvmrRVB_Hbndo0I7z/exec";

let openTime = "";
let closeTime = "";
let lastState = "";
let scheduleEnabled = false;

/* MENU */
function toggleMenu(){
  let m=document.getElementById("menu");
  m.style.display = (m.style.display==="block")?"none":"block";
}

/* LOAD DATA */
async function loadData(){
  try{
    let res = await fetch(scriptURL+"?settings=1");
    let data = await res.json();

    openTime = data.openTime || "";
    closeTime = data.closeTime || "";
    lastState = data.status || "Inactive";
    scheduleEnabled = data.scheduleEnabled === "true";

    document.getElementById("openTime").value = openTime;
    document.getElementById("closeTime").value = closeTime;
    document.getElementById("autoToggle").checked = scheduleEnabled;

    updateUI(lastState);
    showSchedule();

  }catch{
    document.getElementById("statusBox").innerHTML="Error loading";
  }
}

/* UI */
function updateUI(state){
  let box=document.getElementById("statusBox");

  if(state==="Active"){
    box.innerHTML="🟢 FORM ACTIVE";
    box.style.background="#d4f8d4";
    box.style.color="green";
  }else{
    box.innerHTML="🔴 FORM CLOSED";
    box.style.background="#ffd6d6";
    box.style.color="red";
  }
}

/* SHOW SCHEDULE */
function showSchedule(){
  let info=document.getElementById("scheduleInfo");

  if(openTime && closeTime){
    info.innerHTML = `
      Opens: <b>${new Date(openTime).toLocaleString()}</b><br>
      Closes: <b>${new Date(closeTime).toLocaleString()}</b>
    `;
  }
}

/* SEND STATUS */
function sendStatus(state){
  let fd=new FormData();
  fd.append("action","setStatus");
  fd.append("status",state);

  fetch(scriptURL,{method:"POST",body:fd})
  .then(()=>{
    lastState=state;
    updateUI(state);
  });
}

/* MANUAL */
function manualSet(state){
  scheduleEnabled=false;
  document.getElementById("autoToggle").checked=false;

  let fd=new FormData();
  fd.append("action","toggleAuto");
  fd.append("enabled","false");

  fetch(scriptURL,{method:"POST",body:fd});

  sendStatus(state);
}

/* SAVE SCHEDULE */
function saveSchedule(){

  openTime=document.getElementById("openTime").value;
  closeTime=document.getElementById("closeTime").value;

  let fd=new FormData();
  fd.append("action","setSchedule");
  fd.append("openTime",openTime);
  fd.append("closeTime",closeTime);

  fetch(scriptURL,{method:"POST",body:fd})
  .then(()=>{
    alert("Schedule saved!");
    showSchedule();
  });
}

/* TOGGLE AUTO */
function toggleAuto(el){
  scheduleEnabled=el.checked;

  let fd=new FormData();
  fd.append("action","toggleAuto");
  fd.append("enabled",scheduleEnabled);

  fetch(scriptURL,{method:"POST",body:fd});
}

/* AUTO ENGINE (FIXED) */
function runSchedule(){

  if(!scheduleEnabled) return;
  if(!openTime || !closeTime) return;

  let now = new Date();
  let open = new Date(openTime);
  let close = new Date(closeTime);

  let newState;

  if(now >= open && now <= close){
    newState = "Active";
  }else{
    newState = "Inactive";
  }

  if(newState !== lastState){
    sendStatus(newState);
  }
}

/* START */
loadData();
setInterval(runSchedule,5000);

</script>

</body>
</html>
