<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIBWIS RECRUITMENT ADMIN</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { margin: 0; padding: 20px; background: #f0f2f5; color: #333; }
h2 { color: #052; text-align: center; margin-top: 20px; }

.controls { display: flex; justify-content: space-between; flex-wrap: wrap; margin-top: 20px; gap: 10px; }
.controls input, .controls select { padding: 8px; border-radius: 5px; border: 1px solid #ccc; }

.table-responsive { width: 100%; overflow-x: auto; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 10px; min-height: 200px; }
table { width: 100%; border-collapse: collapse; min-width: 1100px; }
th, td { padding: 12px; border: 1px solid #eee; font-size: 13px; text-align: left; }
th { background: #052; color: white; position: sticky; top: 0; z-index: 10; }
tr:hover { background-color: #f1f8f1; }

.btn-edit { background: #ff9800; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; }
.btn-delete { background: #d9534f; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; }

.pagination { margin-top: 15px; text-align: center; }
.pagination button { margin: 3px; padding: 6px 10px; border: none; background: #052; color: white; cursor: pointer; border-radius: 3px; }
.pagination button.active { background: #0a7; font-weight: bold; }

/* MODAL */
#editModal { display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
.modal-content { background: white; margin: 5% auto; padding: 20px; width: 90%; max-width: 400px; border-radius: 10px; max-height: 80vh; overflow-y: auto; }
.modal-actions { display: flex; justify-content: space-between; margin-top: 15px; }

/* SPINNER */
.spinner { border: 4px solid #f3f3f3; border-top: 4px solid #052; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; display: none; }
@keyframes spin { 100% { transform: rotate(360deg); } }

/* SIDEBAR */
#menuBtn { position: fixed; top: 15px; left: 15px; font-size: 22px; cursor: pointer; z-index: 4000; background: #052; color: white; padding: 6px 10px; border-radius: 5px; }
#sidebar { position: fixed; top: 0; left: -260px; width: 250px; height: 100%; background: #052; color: white; padding: 20px; transition: 0.3s; z-index: 3500; }
#sidebar h3 { border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
#sidebar a { display: block; padding: 12px; color: white; text-decoration: none; }
#sidebar a:hover { background: rgba(255,255,255,0.1); border-radius: 5px; }

/* NOTIFICATION */
#notifBox { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
.notif { background:#052; color:white; padding:12px 20px; border-radius:6px; animation: slideIn .3s ease; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
</style>
</head>

<body>

<div id="menuBtn" onclick="toggleSidebar()">⋮</div>

<div id="sidebar">
  <h3>Menu</h3>
  <a href="index.html">Applications Form</a>
  <a href="verify.html">Admin</a>
  <a href="admin.html">Settings</a>
</div>

<h2>FAG OF JIBWIS NGURU RECRUITMENT LIST</h2>

<div class="controls">
  <button onclick="downloadPDF()" style="background:navy;color:white;border:none;padding:8px 15px;border-radius:5px;cursor:pointer;">
    Download PDF
  </button>

  <input type="text" id="searchInput" placeholder="Search records...">

  <div style="display:flex; align-items:center; gap:10px;">
    <span id="totalCount" style="font-weight:bold; color:#052;">Total: 0</span>
    <select id="rowsPerPage">
      <option value="10">Show 10</option>
      <option value="25">Show 25</option>
      <option value="50">Show 50</option>
      <option value="all">Show All</option>
    </select>
  </div>
</div>

<div id="loader" class="spinner"></div>
<div class="table-responsive" id="tableContainer"></div>
<div class="pagination" id="pagination"></div>

<div id="editModal">
  <div class="modal-content">
    <h3>Edit Record</h3>
    <form id="editForm">
      <input type="hidden" name="rowNumber" id="editRowNumber">
      <input type="hidden" name="action" value="edit">
      <div id="dynamicEditFields"></div>
      <div class="modal-actions">
        <button type="button" onclick="closeModal()" style="padding:8px 15px; cursor:pointer;">Cancel</button>
        <button type="submit" id="saveBtn" style="padding:8px 15px; background:#052; color:white; border:none; cursor:pointer;">Save Changes</button>
      </div>
    </form>
  </div>
</div>

<div id="notifBox"></div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwWkfBWnZw7nC1I7QqrlRJEO-sD7AGUaPbh9pnTj_MjvNSK06zkSgH_f5DX-zyhqXkt/exec";

let allData = [];
let filteredData = [];
let currentPage = 1;
let rowsPerPage = 10;
let previousLength = 0;
let isEditing = false; // Prevents refresh while modal is open

window.onload = fetchRecords;

function fetchRecords() {
  const loader = document.getElementById("loader");
  loader.style.display = "block";
  fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
      allData = data;
      previousLength = data.length;
      applySearchAndRender();
    })
    .catch(err => console.error("Fetch Error:", err))
    .finally(() => loader.style.display = "none");
}

/* SEARCH & FILTER LOGIC */
function applySearchAndRender() {
  const value = document.getElementById("searchInput").value.toLowerCase();
  filteredData = allData.filter(row =>
    Object.values(row).join(" ").toLowerCase().includes(value)
  );
  renderTable();
}

document.getElementById("searchInput").addEventListener("input", () => {
  currentPage = 1;
  applySearchAndRender();
});

document.getElementById("rowsPerPage").addEventListener("change", function () {
  rowsPerPage = this.value === "all" ? "all" : parseInt(this.value);
  currentPage = 1;
  renderTable();
});

/* RENDER TABLE */
function renderTable() {
  const container = document.getElementById("tableContainer");
  const countSpan = document.getElementById("totalCount");
  
  countSpan.innerText = "Total: " + filteredData.length;

  if (filteredData.length === 0) {
    container.innerHTML = "<p style='padding:20px; text-align:center;'>No records found.</p>";
    document.getElementById("pagination").innerHTML = "";
    return;
  }

  let start = (rowsPerPage === "all") ? 0 : (currentPage - 1) * rowsPerPage;
  let paginated = (rowsPerPage === "all") ? filteredData : filteredData.slice(start, start + rowsPerPage);

  // Headers (Filtering out hidden technical fields)
  let headers = Object.keys(allData[0]).filter(h => h !== "rowNumber" && h.toLowerCase() !== "otp");

  let html = `<table><thead><tr><th>SN</th>`;
  headers.forEach(h => html += `<th>${h}</th>`);
  html += `<th>Actions</th></tr></thead><tbody>`;

  paginated.forEach((row, i) => {
    let sn = start + i + 1;
    html += `<tr><td>${sn}</td>`;
    headers.forEach(h => html += `<td>${row[h] || ""}</td>`);
    html += `<td>
      <button class="btn-edit" onclick='openEditModal(${JSON.stringify(row)})'>Edit</button>
      <button class="btn-delete" onclick="deleteRow(${row.rowNumber})">Delete</button>
    </td></tr>`;
  });

  html += `</tbody></table>`;
  container.innerHTML = html;
  renderPagination(filteredData.length);
}

function renderPagination(total) {
  const nav = document.getElementById("pagination");
  if (rowsPerPage === "all") { nav.innerHTML = ""; return; }

  let pages = Math.ceil(total / rowsPerPage);
  let html = "";
  for (let i = 1; i <= pages; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  nav.innerHTML = html;
}

function goPage(p) { currentPage = p; renderTable(); }

/* ACTIONS: EDIT & DELETE */
function deleteRow(rowNum) {
  if(!confirm("Are you sure you want to delete this record?")) return;
  
  let fd = new FormData();
  fd.append("action", "delete");
  fd.append("rowNumber", rowNum);

  showNotification("Deleting record...");
  fetch(scriptURL, { method: "POST", body: fd })
    .then(() => fetchRecords());
}

function openEditModal(row) {
  isEditing = true;
  document.getElementById("editRowNumber").value = row.rowNumber;
  const container = document.getElementById("dynamicEditFields");
  container.innerHTML = "";

  Object.keys(row).forEach(k => {
    if (k === "rowNumber" || k.toLowerCase() === "otp" || k.toLowerCase() === "timestamp") return;
    container.innerHTML += `
      <label style="font-size:12px;font-weight:bold;display:block;margin-top:10px;">${k}</label>
      <input type="text" name="${k}" value="${row[k] || ""}" style="width:100%;padding:8px;border:1px solid #ccc;border-radius:4px;">
    `;
  });
  document.getElementById("editModal").style.display = "block";
}

function closeModal() {
  document.getElementById("editModal").style.display = "none";
  isEditing = false;
}

document.getElementById("editForm").onsubmit = function (e) {
  e.preventDefault();
  const btn = document.getElementById("saveBtn");
  btn.innerText = "Saving...";

  fetch(scriptURL, { method: "POST", body: new FormData(this) })
    .then(() => {
      showNotification("Record updated successfully!");
      closeModal();
      fetchRecords();
    })
    .finally(() => btn.innerText = "Save Changes");
};

/* UI: SIDEBAR & NOTIFICATIONS */
function toggleSidebar() {
  const s = document.getElementById("sidebar");
  s.style.left = (s.style.left === "0px") ? "-260px" : "0px";
}

function showNotification(msg) {
  const box = document.getElementById("notifBox");
  const n = document.createElement("div");
  n.className = "notif";
  n.innerText = msg;
  box.appendChild(n);
  setTimeout(() => n.remove(), 4000);
}

/* AUTO REFRESH (Every 20 Seconds, only if not editing) */
setInterval(() => {
  if (isEditing) return;

  fetch(scriptURL)
    .then(r => r.json())
    .then(data => {
      if (data.length !== previousLength) {
        if (previousLength > 0 && data.length > previousLength) {
          showNotification("🔔 " + (data.length - previousLength) + " New Record(s) Added");
        }
        allData = data;
        previousLength = data.length;
        applySearchAndRender();
      }
    });
}, 20000);

/* PDF GENERATION (Repaired with AutoTable) */
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('l', 'mm', 'a4');

  if (filteredData.length === 0) {
    alert("No data to download.");
    return;
  }

  // Filter keys for display
  const headers = Object.keys(allData[0]).filter(h => 
    !["rowNumber", "otp", "timestamp"].includes(h.toLowerCase())
  );

  const tableData = filteredData.map((row, index) => [
    index + 1,
    ...headers.map(h => row[h] || "")
  ]);

  doc.setFontSize(16);
  doc.setTextColor(0, 85, 34);
  doc.text("FAG OF JIBWIS NGURU RECRUITMENT LIST", 14, 15);
  
  doc.autoTable({
    head: [['SN', ...headers]],
    body: tableData,
    startY: 22,
    theme: 'grid',
    styles: { fontSize: 8, cellPadding: 2 },
    headStyles: { fillStyle: [0, 85, 34], textColor: [255, 255, 255] },
    alternateRowStyles: { fillStyle: [240, 248, 240] }
  });

  doc.save("JIBWIS_Recruitment_List.pdf");
}
</script>

</body>
</html>
