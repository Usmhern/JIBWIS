<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JIBWIS RECRUITMENT ADMIN</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

<style>
* { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
body { margin: 0; padding: 20px; background: #f0f2f5; color: #333; }
h2 { color: #052; text-align: center; margin-top: 20px; text-transform: uppercase; letter-spacing: 1px; }

.controls { display: flex; justify-content: space-between; flex-wrap: wrap; margin-top: 20px; gap: 10px; align-items: center; }
.controls input, .controls select { padding: 10px; border-radius: 5px; border: 1px solid #ccc; outline: none; }
.controls input:focus { border-color: #052; }

.table-responsive { width: 100%; overflow-x: auto; background: white; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-top: 15px; }
table { width: 100%; border-collapse: collapse; min-width: 1000px; }
th, td { padding: 12px 15px; border: 1px solid #eee; font-size: 13px; text-align: left; }
th { background: #052; color: white; position: sticky; top: 0; z-index: 10; text-transform: uppercase; }
tr:hover { background-color: #f1f8f1; }

.btn-edit { background: #ff9800; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }
.btn-delete { background: #d9534f; color: white; border: none; padding: 6px 12px; cursor: pointer; border-radius: 4px; font-weight: bold; }

.pagination { margin-top: 20px; text-align: center; }
.pagination button { margin: 0 4px; padding: 8px 12px; border: none; background: #052; color: white; cursor: pointer; border-radius: 4px; transition: 0.3s; }
.pagination button.active { background: #0a7; font-weight: bold; transform: scale(1.1); }

/* MODAL STYLES */
#editModal { display: none; position: fixed; z-index: 5000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); backdrop-filter: blur(3px); }
.modal-content { background: white; margin: 5% auto; padding: 25px; width: 90%; max-width: 450px; border-radius: 12px; max-height: 85vh; overflow-y: auto; }
.modal-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 20px; }
.modal-actions button { padding: 10px 20px; border-radius: 5px; border: none; cursor: pointer; font-weight: bold; }

/* SIDEBAR */
#menuBtn { position: fixed; top: 15px; left: 15px; font-size: 24px; cursor: pointer; z-index: 4000; background: #052; color: white; padding: 5px 12px; border-radius: 5px; }
#sidebar { position: fixed; top: 0; left: -260px; width: 250px; height: 100%; background: #052; color: white; padding: 20px; transition: 0.3s; z-index: 3500; }
#sidebar a { display: block; padding: 15px; color: white; text-decoration: none; border-bottom: 1px solid rgba(255,255,255,0.1); }

/* NOTIFICATIONS */
#notifBox { position: fixed; top: 20px; right: 20px; z-index: 9999; display: flex; flex-direction: column; gap: 10px; }
.notif { background: #052; color: white; padding: 15px 25px; border-radius: 8px; animation: slideIn 0.4s ease-out; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border-left: 5px solid #0a7; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

.spinner { border: 4px solid #f3f3f3; border-top: 4px solid #052; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 40px auto; display: none; }
@keyframes spin { 100% { transform: rotate(360deg); } }
</style>
</head>

<body>

<div id="menuBtn" onclick="toggleSidebar()">⋮</div>

<div id="sidebar">
  <h2 style="color:white; font-size: 1.2rem;">Admin Menu</h2>
  <a href="index.html">📖 APPLICATION FORM</a>
  <a href="data.html">📚 DATA</a>
  <a href="admin.html">⚙️ SETTINGS</a>
</div>

<h2>Recruitment Management Portal</h2>

<div class="controls">
  <button onclick="downloadPDF()" style="background:navy; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; font-weight:bold;">
    Export PDF (Portrait)
  </button>

  <input type="text" id="searchInput" placeholder="Search records...">

  <div style="display:flex; align-items:center; gap:10px;">
    <select id="sortOrder">
      <option value="newest">Sort: Newest First</option>
      <option value="az">Sort: Name (A-Z)</option>
    </select>
    
    <span id="totalCount" style="font-weight:bold; color:#052; background: #e8f5e9; padding: 5px 12px; border-radius: 20px;">Total: 0</span>
    
    <select id="rowsPerPage">
      <option value="10">Show 10</option>
      <option value="25">Show 25</option>
      <option value="50">Show 50</option>
      <option value="all">Show All</option>
    </select>
  </div>
</div>

<div id="loader" class="spinner"></div>
<div class="table-responsive" id="tableContainer"></div>
<div class="pagination" id="pagination"></div>

<div id="editModal">
  <div class="modal-content">
    <h3>Update Applicant Details</h3>
    <form id="editForm">
      <input type="hidden" name="rowNumber" id="editRowNumber">
      <input type="hidden" name="action" value="edit">
      <div id="dynamicEditFields"></div>
      <div class="modal-actions">
        <button type="button" onclick="closeModal()" style="background:#eee;">Cancel</button>
        <button type="submit" id="saveBtn" style="background:#052; color:white;">Update Record</button>
      </div>
    </form>
  </div>
</div>

<div id="notifBox"></div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbwWkfBWnZw7nC1I7QqrlRJEO-sD7AGUaPbh9pnTj_MjvNSK06zkSgH_f5DX-zyhqXkt/exec";

let allData = [];
let filteredData = [];
let currentPage = 1;
let rowsPerPage = 10;
let previousLength = 0;
let isEditing = false; 

window.onload = fetchRecords;

function fetchRecords() {
  document.getElementById("loader").style.display = "block";
  fetch(scriptURL)
    .then(res => res.json())
    .then(data => {
      allData = data;
      previousLength = data.length;
      applySearchAndRender();
    })
    .finally(() => document.getElementById("loader").style.display = "none");
}

function applySearchAndRender() {
  const value = document.getElementById("searchInput").value.toLowerCase();
  const sort = document.getElementById("sortOrder").value;

  // 1. Filter
  let results = allData.filter(row =>
    Object.values(row).join(" ").toLowerCase().includes(value)
  );

  // 2. Sort
  if (sort === "az") {
    results.sort((a, b) => {
      // Assumes your first column is Name. Adjust "FullName" to your actual sheet header if needed.
      const nameA = (a.FullName || a.Name || "").toString().toLowerCase();
      const nameB = (b.FullName || b.Name || "").toString().toLowerCase();
      return nameA.localeCompare(nameB);
    });
  } else {
    // Default: Newest first (assuming RowNumber reflects insertion order)
    results.sort((a, b) => b.rowNumber - a.rowNumber);
  }

  filteredData = results;
  renderTable();
}

document.getElementById("searchInput").addEventListener("input", applySearchAndRender);
document.getElementById("sortOrder").addEventListener("change", applySearchAndRender);
document.getElementById("rowsPerPage").addEventListener("change", function() {
  rowsPerPage = this.value === "all" ? "all" : parseInt(this.value);
  currentPage = 1;
  renderTable();
});

function renderTable() {
  const container = document.getElementById("tableContainer");
  document.getElementById("totalCount").innerText = "Total: " + filteredData.length;

  if (filteredData.length === 0) {
    container.innerHTML = "<p style='padding:30px; text-align:center;'>No matching records found.</p>";
    return;
  }

  let start = (rowsPerPage === "all") ? 0 : (currentPage - 1) * rowsPerPage;
  let paginated = (rowsPerPage === "all") ? filteredData : filteredData.slice(start, start + rowsPerPage);

  let headers = Object.keys(allData[0]).filter(h => 
    !["rownumber", "otp", "timestamp"].includes(h.toLowerCase().replace(/\s/g, ''))
  );

  let html = `<table><thead><tr><th>SN</th>`;
  headers.forEach(h => html += `<th>${h}</th>`);
  html += `<th>Actions</th></tr></thead><tbody>`;

  paginated.forEach((row, i) => {
    html += `<tr><td>${start + i + 1}</td>`;
    headers.forEach(h => html += `<td>${row[h] || ""}</td>`);
    html += `<td>
      <button class="btn-edit" onclick='openEditModal(${JSON.stringify(row)})'>Edit</button>
      <button class="btn-delete" onclick="deleteRow(${row.rowNumber})">Delete</button>
    </td></tr>`;
  });

  html += `</tbody></table>`;
  container.innerHTML = html;
  renderPagination(filteredData.length);
}

function renderPagination(total) {
  const nav = document.getElementById("pagination");
  if (rowsPerPage === "all" || total <= rowsPerPage) { nav.innerHTML = ""; return; }
  let pages = Math.ceil(total / rowsPerPage);
  let html = "";
  for (let i = 1; i <= pages; i++) {
    html += `<button class="${i === currentPage ? 'active' : ''}" onclick="goPage(${i})">${i}</button>`;
  }
  nav.innerHTML = html;
}

function goPage(p) { currentPage = p; renderTable(); }

function showNotification(msg) {
  const box = document.getElementById("notifBox");
  const n = document.createElement("div");
  n.className = "notif";
  n.innerText = msg;
  box.appendChild(n);
  setTimeout(() => {
    n.style.opacity = "0";
    n.style.transition = "opacity 0.5s ease";
    setTimeout(() => n.remove(), 500);
  }, 4000);
}

function deleteRow(n) {
  if(!confirm("Are you sure you want to delete this record?")) return;
  let fd = new FormData(); fd.append("action", "delete"); fd.append("rowNumber", n);
  showNotification("Deleting record...");
  fetch(scriptURL, { method: "POST", body: fd }).then(() => fetchRecords());
}

function openEditModal(row) {
  isEditing = true;
  document.getElementById("editRowNumber").value = row.rowNumber;
  const container = document.getElementById("dynamicEditFields");
  container.innerHTML = "";
  Object.keys(row).forEach(k => {
    if (["rownumber", "otp", "timestamp"].includes(k.toLowerCase().replace(/\s/g, ''))) return;
    container.innerHTML += `<label style="display:block;margin-top:10px;font-weight:bold;">${k.toUpperCase()}</label>
    <input type="text" name="${k}" value="${row[k] || ""}" style="width:100%;padding:10px;border-radius:5px;border:1px solid #ddd;">`;
  });
  document.getElementById("editModal").style.display = "block";
}

function closeModal() { document.getElementById("editModal").style.display = "none"; isEditing = false; }

editForm.onsubmit = function(e) {
  e.preventDefault();
  const btn = document.getElementById("saveBtn");
  btn.innerText = "Saving...";
  fetch(scriptURL, { method: "POST", body: new FormData(this) })
    .then(() => { closeModal(); fetchRecords(); showNotification("Database Updated!"); })
    .finally(() => btn.innerText = "Update Record");
};

function toggleSidebar() {
  const s = document.getElementById("sidebar");
  s.style.left = (s.style.left === "0px") ? "-260px" : "0px";
}

/* AUTO REFRESH - 2 SECONDS */
setInterval(() => {
  const isTyping = document.activeElement === document.getElementById("searchInput");
  if (isEditing || isTyping) return;

  fetch(scriptURL)
    .then(r => r.json())
    .then(data => {
      if (previousLength !== 0 && data.length > previousLength) {
        showNotification("🔔 " + (data.length - previousLength) + " New Applicant(s) Added");
      }
      if (data.length !== previousLength || JSON.stringify(data) !== JSON.stringify(allData)) {
        allData = data;
        previousLength = data.length;
        applySearchAndRender();
      }
    })
    .catch(e => console.log("Refresh failed silently"));
}, 2000);

/* PDF GENERATION - ONLY HEADING COLORED */
function downloadPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF('p', 'mm', 'a4');

  if (filteredData.length === 0) return alert("No data to export");

  const excluded = ["rownumber", "timestamp", "otp"];
  const headers = Object.keys(allData[0]).filter(h => 
    !excluded.includes(h.toLowerCase().replace(/\s/g, ''))
  );

  const tableData = filteredData.map((row, index) => [
    index + 1,
    ...headers.map(h => row[h] || "")
  ]);

  doc.setFontSize(14);
  doc.setTextColor(0, 85, 34); 
  doc.text("FAG OF JIBWIS NGURU RECRUITMENT LIST", 105, 15, { align: "center" });
  
  doc.autoTable({
    head: [['SN', ...headers]],
    body: tableData,
    startY: 22,
    theme: 'grid',
    styles: { 
      fontSize: 7, 
      cellPadding: 2, 
      textColor: [0, 0, 0], // Body text color: Black
      fillColor: [255, 255, 255] // Body background: White
    },
    headStyles: { 
      fillColor: [0, 85, 34], // Heading background: JIBWIS Green
      textColor: [255, 255, 255], // Heading text: White
      halign: 'center' 
    },
    alternateRowStyles: { 
      fillColor: [255, 255, 255] // Disable alternate row coloring
    },
    columnStyles: { 0: { cellWidth: 8 } }
  });

  doc.save("JIBWIS_Recruitment.pdf");
}
</script>

</body>
  </html>
